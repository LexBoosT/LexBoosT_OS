---
title: Custom
description: Custom LexBoosT OS™ configuration
privilege: Admin
actions:

  - !status: {
      status: "LexBoosT OS™ 26.06",
    }
  - !run: {
      exe: ".\\Scripts\\PAUSE.CMD",
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
      weight: 200,
    }
  - !status: {
      status: "Starting Installation!",
    }
  - !run: {
      exe: ".\\Scripts\\PAUSE.CMD",
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
      weight: 200,
    }
  - !taskKill: {
      name: "explorer",
      errorAction: Ignore,
    }
  # ============================================
  # PHASE 0: PRE-INSTALLATION BACKUP
  # ============================================
  - !status: {
      status: "Pre-Install Backup",
      option: "backup",
    }
  - !task: {
      path: 'Tasks\phase0-backup.yml',
      option: "backup",
    }

  # ============================================
  # PHASE 1: INITIALIZATION
  # ============================================
  - !powerShell: {
    command: '.\Scripts\Finalize\KILL_PROCESSES.PS1',
    exeDir: true,
    wait: true,
    }

  - !task: {
      path: 'Tasks\start.yml',
    }

  # ============================================
  # PHASE 2: PACKAGE MANAGEMENT
  # ============================================
  - !task: {
      path: 'Tasks\packages\win-sxs.yml',
      onUpgrade: false,
    }
  - !task: {
      path: 'Tasks\packages\app-win32.yml',
      onUpgrade: false,
    }
  - !task: {
      path: 'Tasks\packages\appx.yml',
      onUpgrade: false,
    }
  - !task: {
      path: 'Tasks\packages\optional-features.yml',
    }

  # ============================================
  # PHASE 3: SOFTWARE INSTALLATION
  # ============================================
  - !task: {
      path: 'Tasks\software.yml',
    }

  # ============================================
  # PHASE 4: SERVICES CONFIGURATION
  # ============================================
  - !task: {
      path: 'Tasks\services.yml',
    }

  # ============================================
  # PHASE 5: REGISTRY CONFIGURATION
  # ============================================
  - !task: {
      path: 'Tasks\registry.yml',
    }

  # ============================================
  # PHASE 5b: DEVICE SCRIPTS (ex-registry, déplacé pour éviter limite de !run)
  # ============================================
  - !task: {
      path: 'Tasks\network-stack.yml',
      onUpgrade: false,
    }
  - !task: {
      path: 'Tasks\devices-scripts.yml',
    }

  # ============================================
  # PHASE 6: FINAL CONFIGURATION
  # ============================================
  - !task: {
      path: 'Tasks\final.yml',
    }

  # ============================================
  # PHASE 6b: APPLY DEFAULT USER HIVES (après tous les HKCU pour propagation correcte)
  # ============================================
  - !status: {
      status: "Apply Default User Hives",
    }
  - !powerShell: {
      command: '.\\Scripts\\Setup\\APPLYDUHIVE.PS1',
      exeDir: true,
      wait: true,
    }
  # ============================================
  # PHASE 7: THEME CONFIGURATION (Optional)
  # ============================================
  - !status: {
      status: "Applying LexBoosT™ Theme",
      option: "configure-theme",
    }
  - !task: {
      path: 'Tasks\registry\LexBoosT-theme.yml',
      option: "configure-theme",
    }
