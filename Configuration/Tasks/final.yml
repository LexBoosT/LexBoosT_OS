---
title: Finalization
description: Applies LexBoosT OS™ final configurations
privilege: TrustedInstaller
actions:
  # ============================================
  # PHASE 1: TIME & SYSTEM CONFIGURATION
  # ============================================
  - !powerShell: {
    command: '.\\Scripts\\TIME_NTP.PS1',
    exeDir: true,
    runas: currentUserElevated,
    wait: true,
    onUpgrade: false,
  }

  # Disable Windows Update Auto Registration
  - !registryValue: {
      path: 'HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\WindowsUpdate\\Services\\Pending\\7971f918-a847-4430-9279-4a52d1efe18d',
      value: "RegisterWithAU",
      type: REG_DWORD,
      data: "0",
    }

  # Network Performance (Disable LLMNR)
  - !registryValue: {
      path: 'HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows NT\\DNSClient',
      value: "EnableMulticast",
      type: REG_DWORD,
      data: "0",
    }

  # ============================================
  # PHASE 2: POWER SCHEME CONFIGURATION
  # ============================================
  - !registryValue: {
      path: 'HKCR\\powerscheme\\DefaultIcon',
      value: "",
      type: REG_SZ,
      data: "%windir%\\System32\\powercpl.dll,1",
      onUpgrade: false,
    }
  - !registryValue: {
      path: 'HKCR\\powerscheme\\Shell\\open\\command',
      value: "",
      type: REG_SZ,
      data: 'powercfg /import "%1"',
      onUpgrade: false,
    }
  - !registryValue: {
      path: 'HKCR\\.pow',
      value: "",
      type: REG_SZ,
      data: "powerscheme",
      onUpgrade: false,
    }
  - !registryValue: {
      path: 'HKCR\\.pow',
      value: "FriendlyTypeName",
      type: REG_SZ,
      data: "Power Scheme",
      onUpgrade: false,
    }

  # ============================================
  # PHASE 3: POWERSHELL NOLOGO
  # ============================================
  - !powerShell: {
      command: '.\\Scripts\\POWERSHELL_NOLOGO.PS1',
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
      onUpgrade: false,
    }

  # ============================================
  # PHASE 4: DESKTOP & START MENU
  # ============================================
  - !status: {
      status: "Config Start Menu",
      option: "wipe-startmenu",
    }

  - !run: { exeDir: true, exe: ".\\Scripts\\STARTMENU.CMD", weight: 400, option: "wipe-startmenu"}
  - !powerShell: { weight: 200, runas: currentUserElevated, wait: true, exeDir: true, command: '.\\Scripts\\DELETE_PINS.PS1', option: "wipe-startmenu" }
  - !powerShell: { weight: 200, runas: currentUserElevated, wait: true, exeDir: true, command: '.\\Scripts\\STARTMENU_FOLDERS.PS1', option: "wipe-startmenu" }
  - !status: {
      status: "Config Scheduled Tasks",
      onUpgrade: false,
    }
  - !powerShell: {
      command: '.\\Scripts\\SCHEDULED-TASKS-DISABLE.PS1',
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
      weight: 200,
      onUpgrade: false,
    }

  # ============================================
  # PHASE 5: THEME & VISUALS (Optional)
  # ============================================
  - !status: {
      status: "Copying Wallpapers",
      option: "configure-theme",
    }
  - !powerShell: {
      command: '.\\Scripts\\THEME_DEPLOY.PS1 -Action CopyWallpapers',
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
      weight: 100,
      ignoreErrors: true,
      option: "configure-theme",
    }
  - !status: {
      status: "Config Theme",
      option: "configure-theme",
    }
  - !powerShell: {
      command: '.\\Scripts\\WALLPAPER.PS1 -Mode Desktop -ImagePath $env:systemroot\\Web\\Wallpaper\\LexBoosTOS\\v3\\desktop.jpg',
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
      weight: 45,
      option: "configure-theme",
    }
  - !powerShell: {
      command: '.\\Scripts\\WALLPAPER.PS1 -Mode LockScreen -ImagePath $env:systemroot\\Web\\Wallpaper\\LexBoosTOS\\v3\\lockscreen.jpg',
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
      weight: 45,
      option: "configure-theme",
    }
  - !powerShell: {
      command: '.\\Scripts\\THEME_DEPLOY.PS1 -Action SetDefaultTile',
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
      weight: 45,
      option: "configure-theme",
    }
  - !cmd: {
      command: 'copy /y "Themes" "%windir%\\Resources\\Themes" > nul',
      runas: currentUserElevated,
      wait: true,
      weight: 10,
      exeDir: true,
      option: "configure-theme",
    }
  - !status: {
      status: "Modifying User Avatar",
      option: "configure-theme",
    }
  - !powerShell: {
      command: '.\\Scripts\\PFP.PS1',
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
      option: "configure-theme",
    }
  - !powerShell: {
      command: '.\\Scripts\\TERMINAL.PS1',
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
      option: "configure-terminal",
      onUpgrade: false,
    }
  - !powerShell: {
      command: '.\\Scripts\\WINVER.PS1',
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
    }

  # ============================================
  # PHASE 6: LEXBOOST TOOLS (Optional)
  # ============================================
  - !status: {
      status: "Copying Launcher Files",
    }
  - !powerShell: {
      command: '.\\Scripts\\COPY_LAUNCHER_FILES.PS1',
      exeDir: true,
      wait: true,
      weight: 200,
      ignoreErrors: true,
    }
  - !status: {
      status: "Applying Visual Effects",
      option: "lex-visual",
      onUpgrade: false,
    }
  - !powerShell: {
      command: '.\\Scripts\\VISUAL.PS1',
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
      weight: 400,
      option: "lex-visual",
      onUpgrade: false,
    }

  # ============================================
  # PHASE 7: FILE ASSOCIATIONS & CONTEXT MENU
  # ============================================
  - !powerShell: {
    command: '.\\Scripts\\FILE_ASSOCIATIONS.PS1',
    exeDir: true,
    runas: currentUserElevated,
    wait: true,
    onUpgrade: false,
  }

  # Rollback context menu on desktop background
  - !registryValue: {
      path: 'HKCR\\DesktopBackground\\Shell\\LexBoosTRollback',
      value: "MUIVerb",
      type: REG_SZ,
      data: "Restore LexBoosT OS Backup",
      option: "backup",
    }
  - !registryValue: {
      path: 'HKCR\\DesktopBackground\\Shell\\LexBoosTRollback',
      value: "Icon",
      type: REG_SZ,
      data: "rstrui.exe",
      option: "backup",
    }
  - !registryValue: {
      path: 'HKCR\\DesktopBackground\\Shell\\LexBoosTRollback',
      value: "Position",
      type: REG_SZ,
      data: "Bottom",
      option: "backup",
    }
  - !registryValue: {
      path: 'HKCR\\DesktopBackground\\Shell\\LexBoosTRollback\\command',
      value: "",
      type: REG_SZ,
      data: 'C:\\Windows\\System32\\WindowsPowerShell\\v1.0\\powershell.exe -NoProfile -ExecutionPolicy Bypass -File "C:\\ProgramData\\LexBoosTOS\\Scripts\\ROLLBACK.ps1"',
      option: "backup",
    }

  # ============================================
  # PHASE 8: MISCELLANEOUS CONFIGURATION
  # ============================================
  - !status: {
      status: "Config Explorer",
    }
  - !registryValue: {
      path: 'HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\OperationStatusManager',
      value: "EnthusiastMode",
      type: REG_DWORD,
      data: "1",
      onUpgrade: false,
      weight: 300,
    }
  - !status: {
      status: "Disabling Remote Assistance",
    }
  - !registryValue: {
      path: 'HKLM\\SYSTEM\\CurrentControlSet\\Control\\Remote Assistance',
      value: "fAllowFullControl",
      type: REG_DWORD,
      data: "0",
      onUpgrade: false,
    }
  - !registryValue: {
      path: 'HKLM\\SYSTEM\\CurrentControlSet\\Control\\Remote Assistance',
      value: "fAllowToGetHelp",
      type: REG_DWORD,
      data: "0",
      onUpgrade: false,
    }
  - !powerShell: {
      command: '.\\Scripts\\DISABLE_REMOTE_ASSIST_FIREWALL.PS1',
      exeDir: true,
      runas: currentUserElevated,
      ignoreErrors: true,
    }

  # ============================================
  # PHASE 9: FINALIZE OPTIMIZATIONS
  # ============================================
  - !status: {
      status: "LexBoosT™ Optimizations 1/6",
    }
  - !run: {
      exe: ".\\Scripts\\FINALIZE1.CMD",
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
      weight: 200,
    }
  - !status: {
      status: "1/6 Success!",
    }
  - !run: {
      exe: ".\\Scripts\\PAUSE.CMD",
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
      weight: 200,
    }
  - !status: {
      status: "LexBoosT™ Optimizations 2/6",
    }
  - !run: {
      exe: ".\\Scripts\\FINALIZE2.CMD",
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
      weight: 200,
    }
  - !status: {
      status: "2/6 Success!",
    }
  - !run: {
      exe: ".\\Scripts\\PAUSE.CMD",
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
      weight: 200,
    }
  - !status: {
      status: "LexBoosT™ Optimizations 3/6",
    }
  - !run: {
      exe: ".\\Scripts\\FINALIZE3.CMD",
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
      weight: 200,
    }
  - !status: {
      status: "3/6 Success!",
    }
  - !run: {
      exe: ".\\Scripts\\PAUSE.CMD",
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
      weight: 200,
    }
  - !status: {
      status: "LexBoosT™ Optimizations 4/6",
    }
  - !run: {
      exe: ".\\Scripts\\FINALIZE4.CMD",
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
      weight: 200,
    }
  - !status: {
      status: "4/6 Success!",
    }
  - !run: {
      exe: ".\\Scripts\\PAUSE.CMD",
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
      weight: 200,
    }
  - !status: {
      status: "LexBoosT™ Optimizations 5/6",
    }
  - !run: {
      exe: ".\\Scripts\\FINALIZE5.CMD",
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
      weight: 200,
    }
  - !status: {
      status: "5/6 Success!",
    }
  - !run: {
      exe: ".\\Scripts\\PAUSE.CMD",
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
      weight: 200,
    }
  - !status: {
      status: "LexBoosT™ Optimizations 6/6",
    }
  - !run: {
      exe: ".\\Scripts\\FINALIZE6.CMD",
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
      weight: 200,
    }
  - !status: {
      status: "6/6 Success!",
    }
  - !run: {
      exe: ".\\Scripts\\PAUSE.CMD",
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
      weight: 200,
    }
  - !status: {
      status: "Enable Low Latency Profile",
      onUpgrade: false,
    }
  - !powerShell: {
      command: '.\\Scripts\\LOW-LATENCY-PROFILE.PS1',
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
      weight: 200,
      onUpgrade: false,
    }

  # ============================================
  # PHASE 10: CLEANUP
  # ============================================
  - !status: {
      status: "Cleaning Active Setup Stubs",
      onUpgrade: false,
    }
  - !powerShell: {
      command: '.\\Scripts\\CLEANUP-ACTIVE-SETUP.PS1',
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
      weight: 100,
      onUpgrade: false,
    }
  - !status: {
      status: "Cleaning Up Folders",
      onUpgrade: false,
    }
  - !powerShell: {
      command: '.\\Scripts\\DEL_WINOLD_INETPUB.PS1',
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
      weight: 200,
      onUpgrade: false,
    }

  # Clear AppX caches
  - !appx: {
      name: "*Client.CBS*",
      operation: clearCache,
    }
  - !appx: {
      name: "*StartMenuExperienceHost*",
      operation: clearCache,
    }
  - !appx: {
      name: "*Windows.Search*",
      operation: clearCache,
    }
  - !appx: {
      name: "*TCUI*",
      operation: clearCache,
    }

  # Reactivate widgets after Windows update
  - !powerShell: {
    command: '.\Scripts\RESET_WEBEXPERIENCE.PS1',
    exeDir: true,
    runas: currentUserElevated,
    wait: true,
  }

  - !powerShell: {
    command: '.\Scripts\FINAL_POST.PS1',
    exeDir: true,
    runas: currentUserElevated,
    wait: true,
  }

  # ============================================
  # RUNTIMES / .NET optimization
  # ============================================
  - !status: {status: 'Configuring Runtimes', onUpgrade: false}
  - !run:
      exeDir: true
      exe: 'powershell.exe'
      args: '-NoProfile -ExecutionPolicy Bypass -File ".\Scripts\RUNTIMES.PS1"'
      runas: currentUserElevated
      wait: true
      weight: 100
      onUpgrade: false

  # ============================================
  # Save system configuration log
  # ============================================
  - !status: {status: 'Saving System Config Log'}
  - !run:
      exeDir: true
      exe: 'powershell.exe'
      args: '-NoProfile -ExecutionPolicy Bypass -File ".\Scripts\SAVE-SYSTEMCONFIGURATIONLOG.PS1"'
      runas: currentUserElevated
      wait: true
      weight: 100

  - !status: {
      status: "Desktop Preparation",
    }
  - !powerShell: {
      command: '.\\Scripts\\ICONS_DESK.PS1',
      exeDir: true,
      runas: currentUserElevated,
      wait: true,
      weight: 200,
    }
