---
title: Software
description: Installs runtimes and browsers
privilege: TrustedInstaller
actions:
  # ============================================
  # PHASE 1: RUNTIME INSTALLATION
  # ============================================
  - !status: {
      status: "Installing Runtimes",
      onUpgrade: false,
    }
  - !powerShell:
      weight: 200
      runas: currentUserElevated
      onUpgrade: false
      wait: true
      exeDir: true
      command: '.\\Scripts\\Setup\\RUNTIMES.PS1'

  # ============================================
  # PHASE 2: BROWSER INSTALLATION (Optional)
  # ============================================
  - !status: {
      status: "Installing Browser",
    }
  - !task: {
      path: 'Tasks/Software/Browsers/Brave.yml',
      option: "Brave",
    }
  - !task: {
      path: 'Tasks/Software/Browsers/Chrome.yml',
      option: "Chrome",
    }
  - !task: {
      path: 'Tasks/Software/Browsers/Firefox.yml',
      option: "Firefox",
    }
  - !task: {
      path: 'Tasks/Software/Browsers/Vivaldi.yml',
      option: "Vivaldi",
    }
  - !task: {
      path: 'Tasks/Software/Browsers/OperaGX.yml',
      option: "OperaGX",
    }
  - !task: {
      path: 'Tasks/Software/Browsers/Zen.yml',
      option: "Zen",
    }