---
title: Configure NDIS Network Driver
description: Optimize NDIS network driver parameters for lower latency and reduced overhead
privilege: TrustedInstaller
actions:
  # === ReceiveWorkerThreadPriority - Maximum priority for NDIS receive threads
  # ------> 31 = Highest priority (reduces network latency)
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\NDIS\Parameters',
      value: "ReceiveWorkerThreadPriority",
      type: REG_DWORD,
      data: "31",
    }
  # === TrackNblOwner - Disable NBL owner tracking (reduces CPU overhead)
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\NDIS\Parameters',
      value: "TrackNblOwner",
      type: REG_DWORD,
      data: "0",
    }
  # === DisableNDISWatchDog - Disable NDIS watchdog timer
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\NDIS\Parameters',
      value: "DisableNDISWatchDog",
      type: REG_DWORD,
      data: "1",
    }
  # === DebugLoggingMode - Disable NDIS debug logging
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\NDIS\Parameters',
      value: "DebugLoggingMode",
      type: REG_DWORD,
      data: "0",
    }
  # === DisableWDIWatchdogForceBugcheck - Disable WDI watchdog forced BSOD
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\NDIS\Parameters',
      value: "DisableWDIWatchdogForceBugcheck",
      type: REG_DWORD,
      data: "1",
    }
  # === DisableReenumerationTimeoutBugcheck - Disable re-enumeration timeout BSOD
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\NDIS\Parameters',
      value: "DisableReenumerationTimeoutBugcheck",
      type: REG_DWORD,
      data: "1",
    }