---
title: extreme-performance-optimization
description: Extreme performance optimizations for maximum fluidity
privilege: TrustedInstaller
actions:

  # =============================================
  # OPTIMISATIONS INPUT/USB ULTRA-RÉPONSIVES
  # =============================================

  # Désactiver idle USB
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\USBHUB3\Parameters',
      value: "DisableSelectiveSuspend",
      type: REG_DWORD,
      data: "1",
    }
  # Désactiver selective suspend Bluetooth (évite micro-lags/déconnexions manettes)
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\BthPort\Parameters',
      value: "DisableSelectiveSuspend",
      type: REG_DWORD,
      data: "1",
    }