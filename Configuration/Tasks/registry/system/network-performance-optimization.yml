---
title: network-performance-optimization
description: Advanced network performance and latency optimizations
privilege: TrustedInstaller
actions:

  # ============================================
  # QoS & BUFFERBLOAT PREVENTION
  # ============================================

  # NonBestEffortLimit - Upload bandwidth reservation (20% = 80% available)
  # Reduces bufferbloat by limiting background traffic
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\Psched',
      value: "NonBestEffortLimit",
      type: REG_DWORD,
      data: "20",
    }
  # Allow DSCP marking for applications
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\QoS',
      value: "Application DSCP Marking Request",
      type: REG_SZ,
      data: "Allowed",
    }
  # U fix - Enable upload optimization
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\QoS',
      value: "U fix",
      type: REG_SZ,
      data: "1",
    }
  # D fix - Enable download optimization
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\QoS',
      value: "D fix",
      type: REG_SZ,
      data: "1",
    }
  # ============================================
  # TCP/IP STACK OPTIMIZATIONS
  # ============================================

  # TcpNoDelay - Disable Nagle's algorithm for real-time data
  # Improves responsiveness in online games and VoIP
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters',
      value: "TcpNoDelay",
      type: REG_DWORD,
      data: "1",
    }
  # TcpAckFrequency - Send ACK immediately
  # Reduces latency by not waiting for multiple packets
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters',
      value: "TcpAckFrequency",
      type: REG_DWORD,
      data: "1",
    }
  # TCPDelAckTicks - Disable delayed ACKs
  # 0 = Immediate acknowledgment (lowest latency)
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters',
      value: "TCPDelAckTicks",
      type: REG_DWORD,
      data: "0",
    }
  # DefaultTTL - Time To Live for packets
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters',
      value: "DefaultTTL",
      type: REG_DWORD,
      data: "64",
    }
  # NOTE: MaxUserPort and TcpTimedWaitDelay are managed by network-stack.yml (authoritative source)

  # NOTE: DisableTaskOffload retiré — cette clé est dépréciée sur Windows 11 (gestion par adaptateur).
  # Sur du hardware moderne (1Gbit+), elle augmente la charge CPU sans gain de latence mesurable.

  # ============================================
  # QoS - DISABLE NIC BANDWIDTH LIMITS
  # ============================================

  # Do not use NLA - Disable Network Location Awareness for QoS
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\Tcpip\QoS',
      value: "Do not use NLA",
      type: REG_DWORD,
      data: "1",
    }
  # DoNotUseNICBandwidthLimit - Disable hardware bandwidth limits
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\Tcpip\QoS',
      value: "DoNotUseNICBandwidthLimit",
      type: REG_DWORD,
      data: "1",
    }
  # ============================================
  # SMB & FILE SHARING OPTIMIZATIONS
  # ============================================

  # DisableBandwidthThrottling - Remove SMB bandwidth limits
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\LanmanWorkstation\Parameters',
      value: "DisableBandwidthThrottling",
      type: REG_DWORD,
      data: "1",
    }
  # ============================================
  # NETWORK ADAPTER ADVANCED PROPERTIES
  # ============================================
  # Note: *EEE, EnableGreenEthernet, PowerSavingMode, *FlowControl, *InterruptModeration,
  # *LsoV2IPv4, *LsoV2IPv6 are handled by DEVICES.PS1 (Set-IntelNetworkSettings/Set-RealtekNetworkSettings)

  # *SpeedPowerManagement - Disabled (not in DEVICES.PS1)
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Control\Class\{4d36e972-e325-11ce-bfc1-08002be10318}',
      value: "*SpeedPowerManagement",
      type: REG_SZ,
      data: "0",
    }
  # *ReceiveSideScaling - Enable RSS for multi-core utilization (not in DEVICES.PS1)
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Control\Class\{4d36e972-e325-11ce-bfc1-08002be10318}',
      value: "*ReceiveSideScaling",
      type: REG_SZ,
      data: "1",
    }