---
title: Configure System -> Win32PrioritySeparation
description: Configure Win32PrioritySeparation
privilege: TrustedInstaller
actions:

    # --- Quantum is the amount of time the Windows process scheduler allocates to a thread.
    # -----> 42 (0x2A) = Short quantum, Fixed, High foreground boost — valeur actuelle
    # -----> 38 (0x26) = Short quantum, Variable, High foreground boost — alternative commune
    # -----> 22 (0x16) = Long quantum, Variable, High foreground boost — pour workstations
    # AUDIT: le commentaire précédent mentionnait "26/38" mais la valeur utilisée est 42 (0x2A)
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Control\PriorityControl',
      value: "Win32PrioritySeparation",
      type: REG_DWORD,
      data: "42",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Control\PriorityControl',
      value: "ConvertibleSlateMode",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\ControlSet001\Control\PriorityControl',
      value: "Win32PrioritySeparation",
      type: REG_DWORD,
      data: "42",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\ControlSet001\Control\PriorityControl',
      value: "ConvertibleSlateMode",
      type: REG_DWORD,
      data: "0",
    }