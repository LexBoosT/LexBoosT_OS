      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\sppsvc.exe\PerfOptions',
      value: IoPriority,
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
