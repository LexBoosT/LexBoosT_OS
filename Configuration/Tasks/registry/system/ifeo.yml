---
title: configure-ifeo
description: configure-ifeo
privilege: TrustedInstaller
actions:

  # === CEIP
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\CompatTelRunner.exe',
      value: "Debugger",
      type: REG_SZ,
      data: "%windir%\\System32\\taskkill.exe",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\AggregatorHost.exe',
      value: "Debugger",
      type: REG_SZ,
      data: "%windir%\\System32\\taskkill.exe",
    }

  # === Webcam Telemetry
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\DeviceCensus.exe',
      value: "Debugger",
      type: REG_SZ,
      data: "%windir%\\System32\\taskkill.exe",
    }

    # === Microsoft PC Manager spread
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\FeatureLoader.exe',
      value: "Debugger",
      type: REG_SZ,
      data: "%windir%\\System32\\taskkill.exe",
    }

  # === Bing pop-up ads
  # -----> https://www.windowslatest.com/2024/03/15/microsoft-confirms-bing-pop-up-ads-in-chrome-on-windows-11-windows-10/
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\BingChatInstaller.exe',
      value: "Debugger",
      type: REG_SZ,
      data: "%windir%\\System32\\taskkill.exe",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\BGAUpsell.exe',
      value: "Debugger",
      type: REG_SZ,
      data: "%windir%\\System32\\taskkill.exe",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\BCILauncher.exe',
      value: "Debugger",
      type: REG_SZ,
      data: "%windir%\\System32\\taskkill.exe",
    }

  # === CrossDeviceResume.exe — processus de reprise après hibernation
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\CrossDeviceResume.exe',
      value: debugger,
      type: REG_SZ,
      data: "%WINDIR%\\System32\\taskkill.exe",
    }

  # === TextInputHost - Exemption mitigations processus
  # -----> TextInputHost.exe gère WIN+V (historique presse-papiers), clavier tactile et saisie vocale.
  # -----> Sans cette exemption, il crash avec STATUS_STACK_BUFFER_OVERRUN au démarrage.
  # -----> Cause : MitigationOptions kernel = 22 22 22 ... active DEP/ASLR/SEHOP globalement.
  # -----> 0x00 dans IFEO = "hériter des défauts" → crash. 0x33 = "Enforce OFF" → fonctionne.
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\TextInputHost.exe',
      value: "MitigationOptions",
      type: REG_BINARY,
      data: "333333000003000000030000000000000000000000000000",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\TextInputHost.exe',
      value: "MitigationAuditOptions",
      type: REG_BINARY,
      data: "000000000000000000000000000000000000000000000000",
    }


  # === Processus système critiques
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\ctfmon.exe\PerfOptions',
      value: CpuPriorityClass,
      type: REG_DWORD,
      data: "2",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\SearchIndexer.exe\PerfOptions',
      value: CpuPriorityClass,
      type: REG_DWORD,
      data: "5",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\fontdrvhost.exe\PerfOptions',
      value: CpuPriorityClass,
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\fontdrvhost.exe\PerfOptions',
      value: IoPriority,
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\lsass.exe\PerfOptions',
      value: CpuPriorityClass,
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
