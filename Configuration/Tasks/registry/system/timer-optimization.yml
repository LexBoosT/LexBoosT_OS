---
title: Timer Optimization
description: Timer precision, task scheduler, TimeBroker, and packet scheduler tuning.
privilege: TrustedInstaller
actions:

  # =============================================
  # PACKET SCHEDULER (Psched)
  # =============================================

  # === TimerResolution — force highest timer resolution for packet scheduler
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\Psched',
      value: "TimerResolution",
      type: REG_DWORD,
      data: "1",
    }
  # === MaxOutstandingSends — remove send queue limit
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\Psched',
      value: "MaxOutstandingSends",
      type: REG_DWORD,
      data: "0",
    }
  # =============================================
  # TIMEBROKER — system-wide timer precision
  # =============================================

  # === DisableDynamicTick — prevent tick merging on TimeBroker level
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\TimeBroker',
      value: "DisableDynamicTick",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\TimeBroker',
      value: "DisableDynamicTickOnSpecificCores",
      type: REG_DWORD,
      data: "1",
    }
  # === DisableSleepIdle — prevent timer resolution drop during idle
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\TimeBroker',
      value: "DisableSleepIdle",
      type: REG_DWORD,
      data: "1",
    }
  # === Clock & Timer precision — force highest accuracy
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\TimeBroker',
      value: "EnableClockSteering",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\TimeBroker',
      value: "EnableHighResolutionTaskScheduling",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\TimeBroker',
      value: "EnableHighResolutionTimers",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\TimeBroker',
      value: "ForceClockSync",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\TimeBroker',
      value: "ForceHighestPrecision",
      type: REG_DWORD,
      data: "1",
    }
  # === Timer Resolution — force minimum (1 = 0.1ms)
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\TimeBroker',
      value: "MinTimerResolution",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\TimeBroker',
      value: "TimerResolution",
      type: REG_DWORD,
      data: "1",
    }
  # === ReduceIdleTime + TimerFrequencyBoost
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\TimeBroker',
      value: "ReduceIdleTime",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\TimeBroker',
      value: "TimerFrequencyBoost",
      type: REG_DWORD,
      data: "1",
    }
  # =============================================
  # TASK SCHEDULER — prevent throttling, prioritize foreground
  # =============================================

  # === Background Task Control
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\Schedule',
      value: "BackgroundTaskOptimization",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\Schedule',
      value: "DisableBackgroundTaskPriorityBoost",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\Schedule',
      value: "DisableBackgroundTasksDuringGaming",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\Schedule',
      value: "DisableIdleTaskScheduling",
      type: REG_DWORD,
      data: "1",
    }
  # === Task Migration & Exclusive Scheduling
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\Schedule',
      value: "DisableTaskMigration",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\Schedule',
      value: "EnableExclusiveTaskScheduling",
      type: REG_DWORD,
      data: "1",
    }
  # === High Resolution & Real-Time Scheduling
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\Schedule',
      value: "EnableHighResolutionTaskScheduling",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\Schedule',
      value: "EnableRealTimeScheduling",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\Schedule',
      value: "ForceRealTimePriority",
      type: REG_DWORD,
      data: "1",
    }
  # === Task Throttling Prevention
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\Schedule',
      value: "PreventTaskThrottling",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\Schedule',
      value: "RealtimeTaskOptimization",
      type: REG_DWORD,
      data: "1",
    }
  # === Scheduler Quantum Size — minimum for lower latency
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\Schedule',
      value: "SchedulerQuantumSize",
      type: REG_DWORD,
      data: "1",
    }
  # === Task Priority Boost & Processor Groups
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\Schedule',
      value: "TaskSchedulerPriorityBoost",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\Schedule',
      value: "UseProcessorGroups",
      type: REG_DWORD,
      data: "1",
    }
  # =============================================
  # EXPLORER — resource-aware timers
  # =============================================

  # === EnableResourceAwareTimers — disable (reduces timer jitter)
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\ResourceTimers',
      value: "EnableResourceAwareTimers",
      type: REG_DWORD,
      data: "0",
    }