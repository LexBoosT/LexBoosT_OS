---
title: system-process-performance-optimization
description: Optimize critical system processes performance
privilege: TrustedInstaller
actions:

  # =============================================
  # Optimisations des processus système critiques
  # =============================================

  # CSRSS.EXE (Client Server Runtime Process)
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\csrss.exe\PerfOptions',
      value: "IoPriority",
      type: REG_DWORD,
      data: "3",  # High I/O Priority
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\csrss.exe\PerfOptions',
      value: "CpuPriorityClass",
      type: REG_DWORD,
      data: "4",  # Above Normal CPU Priority
    }
  # Files.EXE (Client Server Runtime Process)
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\Files.exe\PerfOptions',
      value: "IoPriority",
      type: REG_DWORD,
      data: "3",  # High I/O Priority
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\Files.exe\PerfOptions',
      value: "CpuPriorityClass",
      type: REG_DWORD,
      data: "4",  # Above Normal CPU Priority
    }
  # SVCHOST.EXE (Service Host Process)
  # NOTE: Above Normal (4) serait contre-productif — svchost héberge des dizaines de services
  # en arrière-plan qui pré-empteraient les threads du jeu. Normal (2) est le bon compromis.
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\svchost.exe\PerfOptions',
      value: "IoPriority",
      type: REG_DWORD,
      data: "3",  # High I/O Priority
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\svchost.exe\PerfOptions',
      value: "CpuPriorityClass",
      type: REG_DWORD,
      data: "2",  # Normal CPU Priority (Above Normal retiré — risque micro-stutters en jeu)
    }
  # EXPLORER.EXE (Windows Explorer)
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\explorer.exe\PerfOptions',
      value: "IoPriority",
      type: REG_DWORD,
      data: "3",  # High I/O Priority
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\explorer.exe\PerfOptions',
      value: "CpuPriorityClass",
      type: REG_DWORD,
      data: "4",  # Above Normal CPU Priority
    }
  # WINLOGON.EXE (Windows Logon Process)
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\winlogon.exe\PerfOptions',
      value: "IoPriority",
      type: REG_DWORD,
      data: "3",  # High I/O Priority
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\winlogon.exe\PerfOptions',
      value: "CpuPriorityClass",
      type: REG_DWORD,
      data: "4",  # Above Normal CPU Priority
    }
  # =============================================
  # Optimisations des processus non-critiques (priorité réduite)
  # =============================================

  # SEARCHINDEXER.EXE (Windows Search Indexer)
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\SearchIndexer.exe\PerfOptions',
      value: "CpuPriorityClass",
      type: REG_DWORD,
      data: "5",  # Below Normal CPU Priority
    }
  # CTFMON.EXE (CTF Loader)
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\ctfmon.exe\PerfOptions',
      value: "CpuPriorityClass",
      type: REG_DWORD,
      data: "2",  # Normal CPU Priority (Default)
    }
  # FONTDRVHOST.EXE (Font Driver Host)
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\fontdrvhost.exe\PerfOptions',
      value: "CpuPriorityClass",
      type: REG_DWORD,
      data: "1",  # Idle CPU Priority
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\fontdrvhost.exe\PerfOptions',
      value: "IoPriority",
      type: REG_DWORD,
      data: "0",  # Very Low I/O Priority
    }
  # SIHOST.EXE (Shell Infrastructure Host)
  # NOTE: Idle (1) rendrait la barre des tâches et l'Action Center lents sur Windows 11.
  # sihost gère les notifications, le taskbar, le centre d'actions. Normal (2) est obligatoire.
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\sihost.exe\PerfOptions',
      value: "CpuPriorityClass",
      type: REG_DWORD,
      data: "2",  # Normal CPU Priority (Idle retiré — casse le taskbar Win11)
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\sihost.exe\PerfOptions',
      value: "IoPriority",
      type: REG_DWORD,
      data: "2",  # Normal I/O Priority
    }
  # SPPSVC.EXE (Software Protection Platform Service)
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\sppsvc.exe\PerfOptions',
      value: "CpuPriorityClass",
      type: REG_DWORD,
      data: "1",  # Idle CPU Priority
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\sppsvc.exe\PerfOptions',
      value: "IoPriority",
      type: REG_DWORD,
      data: "0",  # Very Low I/O Priority
    }