---
title: DWM Optimization
description: Centralized DWM optimization — rendering pipeline, buffers, telemetry, composition, watchdogs, flip model, MPO/overlays, and animations.
privilege: TrustedInstaller
actions:

  - !status: {
      status: "Optimizing DWM",
    }
  # =============================================
  # CATÉGORIE A : RENDERING PIPELINE (LATENCE)
  # =============================================
  # === DisableAdvancedDirectFlip — enable advanced direct flip
  # ------> Bypass some DWM composition, resulting in lower latency and better performance
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "DisableAdvancedDirectFlip",
      type: REG_DWORD,
      data: "0",
    }
  # === DisallowNonDrawListRendering — disable legacy immediate mode
  # ------> Non Draw List rendering = Immediate mode (LEGACY)
  # ------> Draw List Rendering = Retained mode (MODERN)
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "DisallowNonDrawListRendering",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\WOW6432Node\Microsoft\Windows\Dwm',
      value: "DisallowNonDrawListRendering",
      type: REG_DWORD,
      data: "1",
    }
  # === DisableDrawListCaching — disable cached draw lists
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "DisableDrawListCaching",
      type: REG_DWORD,
      data: "1",
    }
  # === EnableEffectCaching — disable DWM effects caching
  # ------> 0 = caching OFF (lower latency at cost of slightly higher GPU usage)
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "EnableEffectCaching",
      type: REG_DWORD,
      data: "0",
    }
  # === EnableImageProcessing — disable image processing pipeline
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "EnableImageProcessing",
      type: REG_DWORD,
      data: "0",
    }
  # === UseHWDrawListEntriesOnWARP — use hardware draw lists on software rendering
  # ------> WARP (Windows Advanced Rasterization Platform): software rendering if HW acceleration isn't available
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "UseHWDrawListEntriesOnWARP",
      type: REG_DWORD,
      data: "1",
    }
  # === UseCopyOnPresent — use copy-on-present for frame delivery
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "UseCopyOnPresent",
      type: REG_DWORD,
      data: "1",
    }
  # === EnableDDisplayScanoutCaching — cache display scanout
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "EnableDDisplayScanoutCaching",
      type: REG_DWORD,
      data: "1",
    }
  # === DiscardSurfaceOnMinimize — free GPU memory when window is minimized
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "DiscardSurfaceOnMinimize",
      type: REG_DWORD,
      data: "1",
    }
  # === FlattenVirtualSurfaceEffectInput — optimize virtual surface rendering
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "FlattenVirtualSurfaceEffectInput",
      type: REG_DWORD,
      data: "1",
    }

  # === IdleTimeout — disable idle timeout
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "IdleTimeout",
      type: REG_DWORD,
      data: "0",
    }
  # =============================================
  # CATÉGORIE B : BUFFER & SYNC (ANTI-TEARING)
  # =============================================
  # === DWM Environment Variables — buffer age and triple buffering
  # ------> 1 frame de buffer = synchro minimale anti-tearing sans latence excessive
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Control\Session Manager\Environment',
      value: "DWM_MAX_BUFFER_AGE",
      type: REG_SZ,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Control\Session Manager\Environment',
      value: "DWM_MAXIMUM_BUFFER_AGE",
      type: REG_SZ,
      data: "1",
    }  # ------> Triple buffer ON = filet de sécurité anti-tearing
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Control\Session Manager\Environment',
      value: "DWM_TRIPLE_BUFFER",
      type: REG_SZ,
      data: "1",
    }
  # =============================================
  # CATÉGORIE C : TÉLÉMÉTRIE DWM (PRIVACY / PERF)
  # =============================================
  # === DWM Telemetry — disable all DWM telemetry keys
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "TelemetryFramesSequenceMaximumPeriodMilliseconds",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "TelemetryFramesSequenceIdleIntervalMilliseconds",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "TelemetryFramesReportPeriodMilliseconds",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "RecurringWatchdogTelemetryTimeoutMilliseconds",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "InitialWatchdogTelemetryTimeoutMilliseconds",
      type: REG_DWORD,
      data: "0",
    }
  # =============================================
  # CATÉGORIE D : ADVANCED COMPOSITION FEATURES
  # =============================================
  # === Primitive Reordering — disable primitive reordering
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "EnablePrimitiveReordering",
      type: REG_DWORD,
      data: "0",
    }
  # === ResampleModeOverride — disable resample override
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "ResampleModeOverride",
      type: REG_DWORD,
      data: "0",
    }
  # === ResampleInLinearSpace — disable linear space resampling (affects visual effects)
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "ResampleInLinearSpace",
      type: REG_DWORD,
      data: "0",
    }
  # === HighColor — keep 30-bit (10bpc) color enabled for HDR/wide-gamut monitors
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "HighColor",
      type: REG_DWORD,
      data: "1",
    }
  # === EnableDesktopOverlays — keep desktop overlays enabled (required for Discord, Steam, VLC)
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "EnableDesktopOverlays",
      type: REG_DWORD,
      data: "1",
    }
  # === FrontBufferRenderChecks — disable front buffer render checks
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "EnableFrontBufferRenderChecks",
      type: REG_DWORD,
      data: "0",
    }
  # === CommonSuperSets — enable common supersets
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "EnableCommonSuperSets",
      type: REG_DWORD,
      data: "1",
    }
  # === OptimizeForDirtyExpressions — optimize incremental rendering
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "OptimizeForDirtyExpressions",
      type: REG_DWORD,
      data: "1",
    }
  # === EnableResizeOptimization — optimize window resize
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "EnableResizeOptimization",
      type: REG_DWORD,
      data: "1",
    }
  # === Overlay Qualification — disable overlay auto-qualification (let apps control overlays)
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "OverlayQualifyInterval",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "OverlayQualifyCount",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "OverlayDisqualifyInterval",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "OverlayDisqualifyCount",
      type: REG_DWORD,
      data: "0",
    }
  # === Extended Composition — color separation, forward-only, Sydney filter
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm\ExtendedComposition',
      value: "EnableColorSeparation",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm\ExtendedComposition',
      value: "ForwardOnlyOnly",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm\ExtendedComposition',
      value: "SydneyDownsampleFilterKernelSize",
      type: REG_DWORD,
      data: "0",
    }
  # =============================================
  # CATÉGORIE E : SCHEDULE & FRAME CONTROL (HKLM\DWM\Schedule)
  # =============================================
  # === Frame Display Scheduling — minimize frame display offset and resolution divisor
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\DWM\Schedule',
      value: "FrameDisplayBaseNegOffsetNS",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\DWM\Schedule',
      value: "FrameDisplayResDivValue",
      type: REG_DWORD,
      data: "1",
    }
  # === Schedule Timing — minimize linger interval
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\DWM\Schedule',
      value: "LingerInterval",
      type: REG_DWORD,
      data: "0",
    }
  # =============================================
  # CATÉGORIE F : FLIP MODEL & PRESENT
  # =============================================
  # === DisableIndependentFlip — enable Independent Flip (lower latency in flip-model games)
  # ------> HKLM + HKCU for full coverage
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "DisableIndependentFlip",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\DWM',
      value: "DisableIndependentFlip",
      type: REG_DWORD,
      data: "0",
    }
  # === MaxQueuedPresentBuffers — 2 buffers for stable icon drag (was in final.yml)
  # ------> Avec 1 seul buffer, le DWM ne peut pas séquencer correctement les étapes du drag.
  # ------> 2 reste très performant tout en donnant au DWM la marge nécessaire.
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\DWM',
      value: "MaxQueuedPresentBuffers",
      type: REG_DWORD,
      data: "2",
    }
  # === FrameLatency — 1 frame (lower input lag, 16ms at 60Hz instead of 33ms)
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\DWM',
      value: "FrameLatency",
      type: REG_DWORD,
      data: "1",
    }
  # === ExclusiveModeFramerateAveragingPeriodMs — 1000ms averaging period (default, stable)
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\DWM\ExtendedComposition',
      value: "ExclusiveModeFramerateAveragingPeriodMs",
      type: REG_DWORD,
      data: "1000",
    }
  # === ExclusiveModeFramerateThresholdPercent — threshold at 1% (HKLM + HKCU)
  # ------> Default 0x2d (45), set to 1 for more aggressive exclusive mode entry
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm\ExtendedComposition',
      value: "ExclusiveModeFramerateThresholdPercent",
      type: REG_DWORD,
      data: "45",
    }
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\DWM\ExtendedComposition',
      value: "ExclusiveModeFramerateThresholdPercent",
      type: REG_DWORD,
      data: "45",
    }
  # =============================================
  # CATÉGORIE G : MPO / OVERLAYS
  # =============================================
  # === OverlayTestMode — delete (fixes MPO flickering/stuttering)
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "OverlayTestMode",
      operation: delete,
    }
  # === OverlayMinFPS — 0 for dynamic overlay switching
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\Dwm',
      value: "OverlayMinFPS",
      type: REG_DWORD,
      data: "0",
    }
  # =============================================
  # CATÉGORIE H : VISUAL & ANIMATIONS
  # =============================================

  # === AlwaysHibernateThumbnails — disable thumbnail hibernation (save memory)
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\DWM',
      value: "AlwaysHibernateThumbnails",
      type: REG_DWORD,
      data: "0",
    }