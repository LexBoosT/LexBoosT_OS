---
title: Configure Privacy -> Customer Experience Improvement Program (CEIP)
description: Configure CEIP
privilege: TrustedInstaller
actions:
  # ------> https://admx.help/?Category=Windows_11_2022&Policy=Microsoft.Policies.InternetCommunicationManagement::CEIPEnable
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\SQMClient\Windows',
      value: "CEIPEnable",
      type: REG_DWORD,
      data: "0",
    }

  # === App-V
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\AppV\CEIP',
      value: "CEIPEnable",
      type: REG_DWORD,
      data: "0",
    }

  # === Found in WinSxS
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\UnattendSettings\SQMClient',
      value: "CEIPEnabled",
      type: REG_DWORD,
      data: "0",
    }
