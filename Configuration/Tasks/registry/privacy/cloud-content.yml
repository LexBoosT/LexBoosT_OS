---
title: Configure Privacy -> Cloud Content
description: Configure Cloud Content
privilege: TrustedInstaller
actions:
  # === Disable Consumer Features — Source: WinUtil / Essential Tweaks
  # Empêche Windows d'installer silencieusement des jeux et apps tierces depuis le Store
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\CloudContent',
      value: "DisableWindowsConsumerFeatures",
      type: REG_DWORD,
      data: "1",
    }

  # === Disable Activity History — Source: WinUtil / Essential Tweaks
  # Désactive le tracking des activités et leur envoi vers les serveurs Microsoft
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\System',
      value: "EnableActivityFeed",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\System',
      value: "PublishUserActivities",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\System',
      value: "UploadUserActivities",
      type: REG_DWORD,
      data: "0",
    }

  # === Do not show Windows Tips - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\CloudContent',
      value: "DisableSoftLanding",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Wow6432Node\Policies\Microsoft\Windows\CloudContent',
      value: "DisableSoftLanding",
      type: REG_DWORD,
      data: "1",
    }

  # === Configure Windows spotlight on lock screen - Disabled
  - !registryValue: {
      path: 'HKCU\Software\Policies\Microsoft\Windows\CloudContent',
      value: "ConfigureWindowsSpotlight",
      type: REG_DWORD,
      data: "2",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Policies\Microsoft\Windows\CloudContent',
      value: "ConfigureWindowsSpotlight",
      type: REG_DWORD,
      data: "2",
    }

  # === Include content from Enterprise spotlight - Disabled
  - !registryValue: {
      path: 'HKCU\Software\Policies\Microsoft\Windows\CloudContent',
      value: "IncludeEnterpriseSpotlight",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Policies\Microsoft\Windows\CloudContent',
      value: "IncludeEnterpriseSpotlight",
      type: REG_DWORD,
      data: "0",
    }

  # === Do not suggest third-party content in Windows spotlight - Enabled
  - !registryValue: {
      path: 'HKCU\Software\Policies\Microsoft\Windows\CloudContent',
      value: "DisableThirdPartySuggestions",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Policies\Microsoft\Windows\CloudContent',
      value: "DisableThirdPartySuggestions",
      type: REG_DWORD,
      data: "1",
    }

  # === Do not use diagnostic data for tailored experiences - Enabled
  - !registryValue: {
      path: 'HKCU\Software\Policies\Microsoft\Windows\CloudContent',
      value: "DisableTailoredExperiencesWithDiagnosticData",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\CloudContent',
      value: "DisableTailoredExperiencesWithDiagnosticData",
      type: REG_DWORD,
      data: "1",
    }

  # === Turn off all Windows spotlight features - Enabled
  - !registryValue: {
      path: 'HKCU\Software\Policies\Microsoft\Windows\CloudContent',
      value: "DisableWindowsSpotlightFeatures",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Policies\Microsoft\Windows\CloudContent',
      value: "DisableWindowsSpotlightFeatures",
      type: REG_DWORD,
      data: "1",
    }

  # === Turn off the Windows Welcome Experience - Enabled
  - !registryValue: {
      path: 'HKCU\Software\Policies\Microsoft\Windows\CloudContent',
      value: "DisableWindowsSpotlightWindowsWelcomeExperience",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Policies\Microsoft\Windows\CloudContent',
      value: "DisableWindowsSpotlightWindowsWelcomeExperience",
      type: REG_DWORD,
      data: "1",
    }

  # === Turn off Windows Spotlight on Action Center - Enabled
  - !registryValue: {
      path: 'HKCU\Software\Policies\Microsoft\Windows\CloudContent',
      value: "DisableWindowsSpotlightOnActionCenter",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Policies\Microsoft\Windows\CloudContent',
      value: "DisableWindowsSpotlightOnActionCenter",
      type: REG_DWORD,
      data: "1",
    }

  # === Turn off Windows Spotlight on Settings - Enabled
  - !registryValue: {
      path: 'HKCU\Software\Policies\Microsoft\Windows\CloudContent',
      value: "DisableWindowsSpotlightOnSettings",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Policies\Microsoft\Windows\CloudContent',
      value: "DisableWindowsSpotlightOnSettings",
      type: REG_DWORD,
      data: "1",
    }

  # === Turn off cloud optimized content - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\CloudContent',
      value: "DisableCloudOptimizedContent",
      type: REG_DWORD,
      data: "1",
    }

  # === Turn off Find my device - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\FindMyDevice',
      value: "AllowFindMyDevice ",
      type: REG_DWORD,
      data: "0",
    }