---
title: Configure Privacy -> Content Delivery Manager
description: Configure Content Delivery Manager
privilege: TrustedInstaller
actions:
  # === Content Delivery - Off
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "ContentDeliveryAllowed",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "ContentDeliveryAllowed",
      type: REG_DWORD,
      data: "0",
    }

  # === Subscribed Content - Off
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContentEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContentEnabled",
      type: REG_DWORD,
      data: "0",
    }

  # === Windows Welcome Experience after Updates - Off
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-310093Enabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-310093Enabled",
      type: REG_DWORD,
      data: "0",
    }

  # === Get tips, tricks and suggestions as you use Windows - Off
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SoftLandingEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-338389Enabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SoftLandingEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-338389Enabled",
      type: REG_DWORD,
      data: "0",
    }

  # === Automatically Install Suggested and Pre-installed Apps - Off
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SilentInstalledAppsEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SilentInstalledAppsEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "PreInstalledAppsEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "PreInstalledAppsEverEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "PreInstalledAppsEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "PreInstalledAppsEverEnabled",
      type: REG_DWORD,
      data: "0",
    }

  # === Pre-installed vendor apps - Off
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "OemPreInstalledAppsEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "OemPreInstalledAppsEnabled",
      type: REG_DWORD,
      data: "0",
    }

  # === Prevent Content Delivery Manager from reverting feature configuration
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "FeatureManagementEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "FeatureManagementEnabled",
      type: REG_DWORD,
      data: "0",
    }

  # === Remove Content Delivery Subcsriptions
  - !registryKey: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager\Subscriptions',
    }
  - !registryKey: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager\Subscriptions',
    }

  # === Remove Suggested Apps from Content Delivery
  - !registryKey: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager\SuggestedApps',
    }
  - !registryKey: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager\SuggestedApps',
    }
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "RemediationRequired",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "RemediationRequired",
      type: REG_DWORD,
      data: "0",
    }

  # === Turn Off Showing App Suggestions
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-314559Enabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-280815Enabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-314563Enabled",
      type: REG_DWORD,
      data: "0",
    } # My People
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-202914Enabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-338387Enabled",
      type: REG_DWORD,
      data: "0",
    } # Facts, Tips and Tricks on Lock Screen
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-280810Enabled",
      type: REG_DWORD,
      data: "0",
    } # OneDrive SyncProviders
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-280811Enabled",
      type: REG_DWORD,
      data: "0",
    } # OneDrive
  # DEFAULT USER
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-314559Enabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-280815Enabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-314563Enabled",
      type: REG_DWORD,
      data: "0",
    } # My People
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-202914Enabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-338387Enabled",
      type: REG_DWORD,
      data: "0",
    } # Facts, Tips and Tricks on Lock Screen
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-280810Enabled",
      type: REG_DWORD,
      data: "0",
    } # OneDrive SyncProviders
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-280811Enabled",
      type: REG_DWORD,
      data: "0",
    } # OneDrive

  # === Disable spotlight on Lock Screen
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "RotatingLockScreenEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "RotatingLockScreenEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "RotatingLockScreenOverlayEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "RotatingLockScreenOverlayEnabled",
      type: REG_DWORD,
      data: "0",
    }

  # ============================================
  # ADDITIONAL CDM KEYS — thorough privacy coverage
  # ============================================
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-353694Enabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-353696Enabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-338393Enabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\SOFTWARE\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-353694Enabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\SOFTWARE\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-353696Enabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\SOFTWARE\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-338393Enabled",
      type: REG_DWORD,
      data: "0",
    }
  # === SubscribedContent-338388Enabled (sponsored app suggestions in Start)
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-338388Enabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\SOFTWARE\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-338388Enabled",
      type: REG_DWORD,
      data: "0",
    }
  # === SystemPaneSuggestionsEnabled (suggestions in Settings app)
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SystemPaneSuggestionsEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\SOFTWARE\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SystemPaneSuggestionsEnabled",
      type: REG_DWORD,
      data: "0",
    }
  # ============================================
  # START TRACK PROGS — disable (HKCU)
  # ============================================
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\Advanced',
      value: "Start_TrackProgs",
      type: REG_DWORD,
      data: "0",
    }
  # ============================================
  # ADS PROMOTIONAL CONTENT — Winhance master switch
  # ============================================
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Winhance\Settings',
      value: "AdsPromotionalContentMode",
      type: REG_DWORD,
      data: "1",
    }