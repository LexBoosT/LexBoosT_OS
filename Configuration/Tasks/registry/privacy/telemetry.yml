      data: "0",
    }

  # === Disable Performance Tracking (PerfTrack)
  # ------> Stops Windows from collecting and logging system performance metrics for telemetry.
  # ------> Purely privacy + slight resource reduction. No impact on actual performance.
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\PerfTrack',
      value: "Disabled",
      type: REG_DWORD,
      data: "1",
    }

  # =============================================
  # HKCU: APPCOMPAT — disable Application Impact Telemetry
  # =============================================
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Policies\Microsoft\Windows\AppCompat',
      value: "AITEnable",
      type: REG_DWORD,
      data: "0",
    }
  # =============================================
  # HKCU: DIAG TRACK
  # =============================================
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Diagnostics\DiagTrack',
      value: "ShowedToastAtLevel",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\CPSS\Store\ImproveInkingAndTyping',
      value: "Value",
      type: REG_DWORD,
      data: "0",
    }
  # =============================================
  # HKCU: FEEDBACK NOTIFICATIONS
  # =============================================
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Policies\Microsoft\Windows\DataCollection',
      value: "DoNotShowFeedbackNotifications",
      type: REG_DWORD,
      data: "1",
    }
  # =============================================
  # HKCU: SEARCH HISTORY — disable
  # =============================================
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\SearchSettings',
      value: "IsDeviceSearchHistoryEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\SearchSettings',
      value: "IsDynamicSearchBoxEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\SearchSettings',
      value: "IsMSACloudSearchEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\SearchSettings',
      value: "IsAADCloudSearchEnabled",
      type: REG_DWORD,
      data: "0",
    }
  # =============================================
  # HKCU: NARRATOR / INKING — telemetry-specific
  # =============================================
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Narrator\NoRoam',
      value: "OnlineServicesEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Narrator\NoRoam',
      value: "ScriptingEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
