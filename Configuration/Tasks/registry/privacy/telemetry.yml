---
title: Configure Privacy -> Data Collection
description: Configure Data Collection, Telemetry
privilege: TrustedInstaller
actions:
  # === Allow Telemetry - Disabled (Group Policy path)
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\DataCollection',
      value: "AllowTelemetry",
      type: REG_DWORD,
      data: "0",
    }

  # === Allow commercial data pipeline - Disabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\DataCollection',
      value: "AllowCommercialDataPipeline",
      type: REG_DWORD,
      data: "0",
    }

  # === Allow device name to be sent in Windows diagnostic data - Disabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\DataCollection',
      value: "AllowDeviceNameInTelemetry",
      type: REG_DWORD,
      data: "0",
    }

  # === Configure Authenticated Proxy usage for the Connected User Experience and Telemetry service - Disabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\DataCollection',
      value: "DisableEnterpriseAuthProxy",
      type: REG_DWORD,
      data: "1",
    }

  # === Configure collection of browsing data for Desktop Analytics - Do not allow sending intranet or internet history (Disabled)
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\DataCollection',
      value: "MicrosoftEdgeDataOptIn",
      type: REG_DWORD,
      data: "0",
    }

  # === Configure telemetry opt-in change notifications - Disable telemetry change notifications
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\DataCollection',
      value: "DisableTelemetryOptInChangeNotification",
      type: REG_DWORD,
      data: "1",
    }

  # === Configure telemetry opt-in setting user interface - Disable telemetry opt-in Settings
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\DataCollection',
      value: "DisableTelemetryOptInSettingsUx",
      type: REG_DWORD,
      data: "1",
    }

  # === Do not show feedback notifications - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\DataCollection',
      value: "DoNotShowFeedbackNotifications",
      type: REG_DWORD,
      data: "1",
    }

  # === Limit Enhanced diagnostic data to the minimum required by Windows Analytics - Disable Windows Analytics collection
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\DataCollection',
      value: "LimitEnhancedDiagnosticDataWindowsAnalytics",
      type: REG_DWORD,
      data: "0",
    }

  # === Limit Diagnostic Log Collection - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\DataCollection',
      value: "LimitDiagnosticLogCollection",
      type: REG_DWORD,
      data: "1",
    }

  # === Limit Dump Collection - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\DataCollection',
      value: "LimitDumpCollection",
      type: REG_DWORD,
      data: "1",
    }

  # === Allow Experimentation - Disabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\current\device\System',
      value: "AllowExperimentation",
      type: REG_DWORD,
      data: "0",
    }

  # === WMI\Autologger - Disabled
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Control\WMI\Autologger\Diagtrack-Listener',
      value: "Start",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
