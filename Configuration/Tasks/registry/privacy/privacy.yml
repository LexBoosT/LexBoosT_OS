---
title: configure-privacy
description: configure-privacy
privilege: TrustedInstaller
actions:
  # ===================
  # === App runtime ===
  # ===================

  # === Allow Microsoft accounts to be optional - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System',
      value: "MSAOptional",
      type: REG_DWORD,
      data: "1",
    }

  # =================
  # === Messaging ===
  # =================

  # === Allow Message Service Cloud Sync - Disabled
  # ------> Disables backup and restore of cellular text messages to Microsoft's cloud service
  # ------> https://admx.help/?Category=Windows_11_2022&Policy=Microsoft.Policies.Messaging::AllowMessageSync
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\Messaging',
      value: "AllowMessageSync",
      type: REG_DWORD,
      data: "0",
    }

  # ===============
  # === Edge UI ===
  # ===============

  # === Disable help tips - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\EdgeUI',
      value: "DisableHelpSticker",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Wow6432Node\Policies\Microsoft\Windows\EdgeUI',
      value: "DisableHelpSticker",
      type: REG_DWORD,
      data: "1",
    }

  # === Turn off tracking of app usage - Enabled
  - !registryValue: {
      path: 'HKCU\Software\Policies\Microsoft\Windows\EdgeUI',
      value: "DisableMFUTracking",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Policies\Microsoft\Windows\EdgeUI',
      value: "DisableMFUTracking",
      type: REG_DWORD,
      data: "1",
    }

  # ===========================================================
  # === Restrict Internet communication (HKEY_CURRENT_USER) ===
  # ===========================================================
  # ------> https://admx.help/?Category=Windows_11_2022&Policy=Microsoft.Policies.InternetCommunicationManagement::InternetManagement_RestrictCommunication_1
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Policies\Explorer',
      value: "NoPublishingWizard",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Policies\Explorer',
      value: "NoWebServices",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKCU\Software\Policies\Microsoft\Windows NT\CurrentVersion\Software Protection Platform',
      value: "NoGenTicket",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Policies\Explorer',
      value: "NoOnlinePrintsWizard",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Policies\Explorer',
      value: "NoInternetOpenWith",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKCU\Software\Policies\Microsoft\Windows NT\Printers',
      value: "DisableHTTPPrinting",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKCU\Software\Policies\Microsoft\Windows NT\Printers',
      value: "DisableWebPnPDownload",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKCU\Software\Policies\Microsoft\Assistance\Client\1.0',
      value: "NoOnlineAssist",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKCU\Software\Policies\Microsoft\Assistance\Client\1.0',
      value: "NoExplicitFeedback",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKCU\Software\Policies\Microsoft\Assistance\Client\1.0',
      value: "NoImplicitFeedback",
      type: REG_DWORD,
      data: "1",
    }

  # ============================================================
  # === Restrict Internet communication (HKEY_LOCAL_MACHINE) ===
  # ============================================================
  # ------> https://admx.help/?Category=Windows_11_2022&Policy=Microsoft.Policies.InternetCommunicationManagement::InternetManagement_RestrictCommunication_2
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer',
      value: "NoPublishingWizard",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer',
      value: "NoWebServices",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows NT\CurrentVersion\Software Protection Platform',
      value: "NoGenTicket",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer',
      value: "NoOnlinePrintsWizard",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\PCHealth\HelpSvc',
      value: "Headlines",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\PCHealth\HelpSvc',
      value: "MicrosoftKBSearch",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\PCHealth\ErrorReporting',
      value: "DoReport",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer',
      value: "NoInternetOpenWith",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\Internet Connection Wizard',
      value: "ExitOnMSICW",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\EventViewer',
      value: "MicrosoftEventVwrDisableLinks",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\Registration Wizard Control',
      value: "NoRegistration",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\SearchCompanion',
      value: "DisableContentFileUpdates",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows NT\Printers',
      value: "DisableHTTPPrinting",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows NT\Printers',
      value: "DisableWebPnPDownload",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\DriverSearching',
      value: "DontSearchWindowsUpdate",
      type: REG_DWORD,
      data: "1",
    }

  # === Prevent Gaming Copilot dll file(s) from loading
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\WindowsRuntime\ActivatableClassId\Microsoft.Xbox.GamingAI.Companion.Host.GamingCompanionHostOptions',
      value: "ActivationType",
      type: REG_DWORD,
      data: "4294967295",
    }
  - !registryValue: {
    path: 'HKLM\SOFTWARE\Microsoft\WindowsRuntime\ActivatableClassId\Microsoft.Xbox.GamingAI.Companion.Host.GamingCompanionHostOptions',
    value: "Server",
    type: REG_SZ,
    data: "",
    }

  # =============================================
  # WORKPLACE JOIN — Block AAD Workplace Join
  # =============================================
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WorkplaceJoin',
      value: "BlockAADWorkplaceJoin",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Policies\Microsoft\Windows\WorkplaceJoin',
      value: "BlockAADWorkplaceJoin",
      type: REG_DWORD,
      data: "1",
    }
  # =============================================
  # REMOTE ASSISTANCE — disable
  # =============================================
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Control\Remote Assistance',
      value: "fAllowToGetHelp",
      type: REG_DWORD,
      data: "0",
    }
  # =============================================
  # SMART APP CONTROL — disable
  # =============================================
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Control\CI\Policy',
      value: "VerifiedAndReputablePolicyState",
      type: REG_DWORD,
      data: "0",
    }
  # =============================================
  # WINDOWS ERROR REPORTING — disable (HKCU)
  # =============================================
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Policies\Microsoft\Windows\Windows Error Reporting',
      value: "Disabled",
      type: REG_DWORD,
      data: "1",
    }
  # =============================================
  # CORTANA — disable (HKLM+HKCU)
  # =============================================
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\Windows Search',
      value: "AllowCortana",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Policies\Microsoft\Windows\Windows Search',
      value: "AllowCortana",
      type: REG_DWORD,
      data: "0",
    }
  # =============================================
  # LOCATION — allow access (user choice preserved)
  # =============================================
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\location',
      value: "Value",
      type: REG_SZ,
      data: "Allow",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\LocationAndSensors',
      value: "DisableLocation",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Policies\Microsoft\Windows\LocationAndSensors',
      value: "DisableLocation",
      type: REG_DWORD,
      data: "0",
    }
  # =============================================
  # WEBCAM / MICROPHONE — allow access
  # =============================================
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\webcam',
      value: "Value",
      type: REG_SZ,
      data: "Allow",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\microphone',
      value: "Value",
      type: REG_SZ,
      data: "Allow",
    }
  # =============================================
  # ACCOUNT INFO / APP DIAGNOSTICS — deny
  # =============================================
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\userAccountInformation',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\appDiagnostics',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }
  # =============================================
  # CONSENT STORE — full lockdown (Deny all capabilities except webcam/microphone)
  # Applied across HKLM, HKCU, .DEFAULT, and all live user SIDs
  # radios, humanInterfaceDevice, trustedDevices — excluded to preserve Bluetooth pairing & HID connectivity
  # =============================================
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\activity',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\appointments',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\bluetooth',
      value: "Value",
      type: REG_SZ,
      data: "Allow",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\bluetoothSync',
      value: "Value",
      type: REG_SZ,
      data: "Allow",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\calendar',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\callHistory',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\cellularData',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\chat',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\contacts',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\email',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\eyeTracker',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\gazeInput',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\generativeAI',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\humanPresence',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\humanInterfaceDevice',
      value: "Value",
      type: REG_SZ,
      data: "Allow",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\location',
      value: "Value",
      type: REG_SZ,
      data: "Allow",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\motion',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\notifications',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\passkeys',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\phoneCall',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\phoneCallHistory',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\radios',
      value: "Value",
      type: REG_SZ,
      data: "Allow",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\spatialPerception',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\backgroundSpatialPerception',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\tasks',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\trustedDevices',
      value: "Value",
      type: REG_SZ,
      data: "Allow",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\userDataTasks',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\userNotificationListener',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\voiceActivation',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }

  # Apply ConsentStore Deny to all live user SIDs and .DEFAULT
  - !powerShell:
      command: '.\\Scripts\\Security\\DENY-CONSENTSTOREPERMISSIONS.PS1'
      exeDir: true
      runas: currentUserElevated
      wait: true
      errorAction: Ignore

  # =============================================
  # ONEDRIVE — block KFM (Folder backup) opt-in
  # =============================================
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\OneDrive',
      value: "KFMBlockOptIn",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Policies\Microsoft\OneDrive',
      value: "KFMBlockOptIn",
      type: REG_DWORD,
      data: "1",
    }
  # =============================================
  # ADVERTISING ID — disable (HKCU+CPSS)
  # =============================================
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Policies\Microsoft\Windows\AdvertisingInfo',
      value: "DisabledByGroupPolicy",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\CPSS\Store\AdvertisingInfo',
      value: "Value",
      type: REG_DWORD,
      data: "0",
    }
  # =============================================
  # INPUT PERSONALIZATION — remove allow
  # =============================================
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\InputPersonalization',
      value: "AllowInputPersonalization",
      operation: delete,
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Policies\Microsoft\InputPersonalization',
      value: "AllowInputPersonalization",
      operation: delete,
    }
  # =============================================
  # GENERATIVE AI — deny globally (HKLM)
  # =============================================
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\generativeAI',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\AppPrivacy',
      value: "LetAppsAccessGenerativeAI",
      type: REG_DWORD,
      data: "2",
    }
  # =============================================
  # SYSTEM AI MODELS — deny & disable usage data
  # =============================================
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\systemAIModels',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\AppPrivacy',
      value: "LetAppsAccessSystemAIModels",
      type: REG_DWORD,
      data: "2",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\systemAIModels',
      value: "RecordUsageData",
      type: REG_DWORD,
      data: "0",
    }
  # === Disable lock screen camera - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\Personalization',
      value: "NoLockScreenCamera",
      type: REG_DWORD,
      data: "1",
    }