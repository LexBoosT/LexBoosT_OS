---
title: Configure general updates settings
description: Configure general updates settings
privilege: TrustedInstaller
actions:
  # ======================
  # === Windows Update ===
  # ======================

  # === Windows Update Notifications - Disabled
  # ------> https://www.askvg.com/fix-how-to-stop-automatic-forced-upgrade-to-feature-updates-in-windows-10/
  - !registryValue: {
      path: 'HKLM\SYSTEM\Setup\UpgradeNotification',
      value: "UpgradeAvailable",
      type: REG_DWORD,
      data: "0",
    }

  # === Disable Malicious Software Reporting tool diagnostic data - Enabled
  # ------> https://admx.help/?Category=Windows10_Telemetry&Policy=Microsoft.Policies.Win10Privacy::DontReportInfection
  # AUDIT: valeur était 0 (reporting actif) — corrigé à 1 pour correspondre à "Disable reporting"
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\MRT',
      value: "DontReportInfectionInformation",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\RemovalTools\MpGears',
      value: "HeartbeatTrackingIndex",
      type: REG_DWORD,
      data: "0",
      }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\RemovalTools\MpGears',
      value: "SpyNetReportingLocation",
      type: REG_MULTI_SZ,
      data: ""
      }

  # =========================
  # === Update & Security ===
  # =========================

  # ======> Delivery Optimization

  # === Allow downloads from other PCs - Off
  # ------> https://admx.help/?Category=Windows_11_2022&Policy=Microsoft.Policies.DeliveryOptimization::DownloadMode
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\DeliveryOptimization',
      value: "DODownloadMode",
      type: REG_DWORD,
      data: "0",
    }

  # =============
  # === Extra ===
  # =============

  # === Prevent Automatic Updates - Enabled
  # ------> Media Player Updates auto update disabled.
  # ------> https://admx.help/?Category=Windows_11_2022&Policy=Microsoft.Policies.MediaPlayer::DisableAutoUpdate
  # AUDIT: valeur était 0 (mise à jour auto active) — corrigé à 1 pour correspondre à "Prevent"
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\WindowsMediaPlayer',
      value: "DisableAutoUpdate",
      type: REG_DWORD,
      data: "1",
    }

  # --- Prevent Windows Update Orchestrator automatically instaling unwanted updates:
  # ------> DevHome, Outlook
  - !registryKey: {
      path: 'HKLM\SOFTWARE\Microsoft\WindowsUpdate\Orchestrator\UScheduler_Oobe\DevHomeUpdate',
      operation: "delete",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\WindowsUpdate\Orchestrator\UScheduler\DevHomeUpdate',
      value: "workCompleted",
      type: REG_DWORD,
      data: "1",
    }
  - !registryKey: {
      path: 'HKLM\SOFTWARE\Microsoft\WindowsUpdate\Orchestrator\UScheduler_Oobe\OutlookUpdate',
      operation: "delete",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\WindowsUpdate\Orchestrator\UScheduler\OutlookUpdate',
      value: "workCompleted",
      type: REG_DWORD,
      data: "1",
    }

  # === Disable Windows Upgrade notice
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU',
      value: "NoAUAsDefaultShutdownOption",
      type: REG_DWORD,
      data: "1",
      }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\WindowsUpdate\UX\Settings',
      value: "HideMCTLink",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\WindowsUpdate\UX\Settings',
      value: "RestartNotificationsAllowed2",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\WindowsUpdate\Orchestrator\UScheduler_Oobe',
      value: "BlockedOobeUpdaters",
      type: REG_SZ,
      data: '["MS_Outlook"]',
    }

  # =============================================
  # EXPEDITED UPDATES — disable (don't force restart)
  # =============================================
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\WindowsUpdate\UX\Settings',
      value: "IsExpedited",
      type: REG_DWORD,
      data: "0",
    }
  # =============================================
  # NO AUTO REBOOT WITH LOGGED ON USERS
  # =============================================
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU',
      value: "NoAutoRebootWithLoggedOnUsers",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU',
      value: "NoAutoRebootWithLoggedOnUsers",
      type: REG_DWORD,
      data: "1",
    }
  # =============================================
  # UPDATE NOTIFICATION LEVEL — remove (show all)
  # =============================================
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate',
      value: "SetUpdateNotificationLevel",
      operation: delete,
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate',
      value: "SetUpdateNotificationLevel",
      operation: delete,
    }
  # =============================================
  # WINDOWS UPDATE — granular policies (from FSOS-XR5)
  # =============================================
  # Prevent WU from waking the system
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate',
      value: "AUPowerManagement",
      type: REG_DWORD,
      data: "0",
    }
  # Defer feature updates by 365 days
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate',
      value: "DeferFeatureUpdates",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate',
      value: "DeferFeatureUpdatesPeriodInDays",
      type: REG_DWORD,
      data: "365",
    }
  # Notify before download/install (do not auto-install)
  - !registryValue: {
      path: 'HKLM\Software\Policies\Microsoft\Windows\WindowsUpdate\AU',
      value: "AUOptions",
      type: REG_DWORD,
      data: "2",
    }
  # Stay on specified target release version
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate',
      value: "TargetReleaseVersion",
      type: REG_DWORD,
      data: "1",
    }
  # =============================================
  # ALLOW WU DOWNLOAD OVER METERED NETWORK — disable
  # =============================================
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\WindowsUpdate\UX\Settings',
      value: "AllowAutoWindowsUpdateDownloadOverMeteredNetwork",
      type: REG_DWORD,
      data: "0",
    }
