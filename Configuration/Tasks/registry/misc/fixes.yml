---
title: fixes
description: fixes
privilege: TrustedInstaller
actions:
  # === Disable Windows Platform Binary Table (WPBT) — Source: WinUtil / Essential Tweaks
  # WPBT permet au fabricant d'exécuter des binaires au boot (anti-theft, drivers forcés).
  # Désactiver élimine ce vecteur d'exécution tiers sans impact sur la stabilité.
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Control\Session Manager',
      value: "DisableWpbtExecution",
      type: REG_DWORD,
      data: "1",
    }

  # === Workaround and fix for Mapped Network Drives and UAC.
  # ------> https://docs.microsoft.com/en-us/troubleshoot/windows-client/networking/mapped-drives-not-available-from-elevated-command#workaround---method-2
  # ------> https://serverfault.com/q/182758
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System',
      value: "EnableLinkedConnections",
      type: REG_DWORD,
      data: "1",
    }

  # === Enable CFG mitigation for Valorant
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\vgc.exe',
      value: "MitigationOptions",
      type: REG_BINARY,
      data: "000000000001000000000000000000000000000000000000",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\vgc.exe',
      value: "MitigationAuditOptions",
      type: REG_BINARY,
      data: "000000000000000000000000000000000000000000000000",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\vgc.exe',
      value: "EAFModules",
      type: REG_SZ,
      data: "",
    }

  # === Enable ASLR mitigation for osu!
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\osu!.exe',
      value: "MitigationOptions",
      type: REG_BINARY,
      data: "000021000000000000000000000000000000000000000000",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\osu!.exe',
      value: "MitigationAuditOptions",
      type: REG_BINARY,
      data: "000000000000000000000000000000000000000000000000",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\osu!.exe',
      value: "EAFModules",
      type: REG_SZ,
      data: "",
    }

  # === Prevent MS Edge Chromium being installed after updates
  # ------> EdgeUpdate policies are handled in deprovisioned-apps.yml

  # === Fix for VS not being allowed to install WebView2
  # ------> Credits to https://github.com/AveYo
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\EdgeUpdate',
      value: "InstallDefault",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\EdgeUpdate',
      value: "Install{56EB18F8-B008-4CBD-B6D2-8C97FE7E9062}",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\EdgeUpdate',
      value: "Install{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}",
      type: REG_DWORD,
      data: "1",
    }

  # === Disable App Archiving
  # Prevents Windows from automatically archiving infrequently used apps
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\Appx',
      value: "AllowAutomaticAppArchiving",
      type: REG_DWORD,
      data: "0",
    }

  # === Disable File History
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\FileHistory',
      value: "Disabled",
      type: REG_DWORD,
      data: "1",
    }