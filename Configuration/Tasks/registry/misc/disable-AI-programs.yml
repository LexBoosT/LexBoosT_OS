---
title: Disable AI on programs
description: Disable AI on different programs — Recall, Copilot, Paint AI, Notepad AI, Widgets
privilege: TrustedInstaller
option: "remove-appx-packages"
actions:

  # ============================================
  # WINDOWS RECALL — Désactivé (24H2+)
  # ============================================
  # Recall capture l'écran en continu pour l'IA — désactivé pour privacy + ressources
  - !registryValue: {
      path: 'HKCU\Software\Policies\Microsoft\Windows\WindowsAI',
      value: "DisableAIDataAnalysis",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsAI',
      value: "DisableAIDataAnalysis",
      type: REG_DWORD,
      data: "1",
    }
  # Clé complémentaire pour les snapshots Recall
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsAI',
      value: "AllowRecallEnablement",
      type: REG_DWORD,
      data: "0",
    }
  # === AllowRecallExport = 0 — Bloque l'export des données Recall (Win11 25H2 / KB5074109+ Jan 2026)
  # Source: Microsoft Learn WindowsAI Policy CSP — empêche tout export vers apps tierces
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsAI',
      value: "AllowRecallExport",
      type: REG_DWORD,
      data: "0",
    }

  # ============================================
  # CLICK TO DO — Désactivé (NOUVEAU dans Windows 11 25H2)
  # ============================================
  # Source: Microsoft Learn WindowsAI Policy CSP — Click to Do prend des screenshots
  # de l'écran et les analyse localement avec l'IA pour proposer des actions.
  # Désactivation pour privacy + élimination du composant d'analyse en continu.
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsAI',
      value: "DisableClickToDo",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKCU\Software\Policies\Microsoft\Windows\WindowsAI',
      value: "DisableClickToDo",
      type: REG_DWORD,
      data: "1",
    }

  # ============================================
  # WINDOWS COPILOT — Désactivé complètement
  # ============================================
  - !registryValue: {
      path: 'HKCU\Software\Policies\Microsoft\Windows\WindowsCopilot',
      value: "TurnOffWindowsCopilot",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsCopilot',
      value: "TurnOffWindowsCopilot",
      type: REG_DWORD,
      data: "1",
    }
  # Bouton Copilot dans la taskbar
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced',
      value: "ShowCopilotButton",
      type: REG_DWORD,
      data: "0",
    }

  # === Paint - AI features disabled via Group Policy === ===
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\default\WindowsAI\DisableCocreator',
      value: "Behavior",
      type: REG_DWORD,
      data: "1056800",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\default\WindowsAI\DisableCocreator',
      value: "highrange",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\default\WindowsAI\DisableCocreator',
      value: "lowrange",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\default\WindowsAI\DisableCocreator',
      value: "mergealgorithm",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\default\WindowsAI\DisableCocreator',
      value: "policytype",
      type: REG_DWORD,
      data: "4",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\default\WindowsAI\DisableCocreator',
      value: "RegKeyPathRedirect",
      type: REG_SZ,
      data: "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\Paint",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\default\WindowsAI\DisableCocreator',
      value: "RegValueNameRedirect",
      type: REG_SZ,
      data: "DisableCocreator",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\default\WindowsAI\DisableCocreator',
      value: "value",
      type: REG_DWORD,
      data: "0",
    }
  # NotePad
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\WindowsNotepad',
      value: "DisableAIFeatures",
      type: REG_DWORD,
      data: "1",
    }

  # === CrossDeviceResume - Version renforcée ===
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\CrossDeviceResume\Configuration',
      value: "IsResumeAllowed",
      data: "0",
      type: REG_DWORD,
      option: "remove-appx-yourphone",
    }
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\CrossDeviceResume\Configuration',
      value: "IsOneDriveResumeAllowed",
      data: "0",
      type: REG_DWORD,
      option: "remove-appx-yourphone",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\default\Connectivity\DisableCrossDeviceResume',
      value: "value",
      data: "1",
      type: REG_DWORD,
      option: "remove-appx-yourphone",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\default\Connectivity\DisableCrossDeviceResume',
      value: "policytype",
      data: "3",
      type: REG_DWORD,
      option: "remove-appx-yourphone",
    }
  # Feature Management (Velocity) - très efficace
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Control\FeatureManagement\Overrides\8\1387020943',
      value: "EnabledState",
      data: "1",
      type: REG_DWORD,
      option: "remove-appx-yourphone",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Policies\Microsoft\FeatureManagement\Overrides',
      value: "1387020943",
      type: REG_DWORD,
      data: "0",
      option: "remove-appx-yourphone",
    }
  - !run: {
    exeDir: true,
    exe: ".\\Scripts\\Cleanup\\CROSSDEVICERESUME.CMD",
    runas: currentUserElevated,
    wait: true,
    weight: 200,
    option: "remove-appx-yourphone",
    }

  # Nettoyage des anciennes clés DisallowRun (causaient popup "restrictions" au démarrage)
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Policies\Explorer',
      value: "DisallowRun",
      operation: delete,
      option: "remove-appx-yourphone",
    }
  - !registryKey: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Policies\Explorer\DisallowRun',
      operation: delete,
      option: "remove-appx-yourphone",
    }
  # Bloquer CrossDeviceResume via IFEO (silent kill, pas de popup "restrictions")
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\CrossDeviceResume.exe',
      value: "Debugger",
      data: "%windir%\\System32\\taskkill.exe",
      type: REG_SZ,
      option: "remove-appx-yourphone",
    }

  # ============================================
  # WINDOWS AI — Settings Agent, Connectors, Workspaces
  # ============================================
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsAI',
      value: "TurnOffSavingSnapshots",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsAI',
      value: "DisableSettingsAgent",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsAI',
      value: "DisableAgentConnectors",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsAI',
      value: "DisableAgentWorkspaces",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsAI',
      value: "DisableRemoteAgentConnectors",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsAI',
      value: "AllowCopilotRuntime",
      type: REG_DWORD,
      data: "0",
    }
  # ============================================
  # COPILOT HARDWARE KEY — clear action
  # ============================================
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\CopilotKey',
      value: "SetCopilotHardwareKey",
      type: REG_SZ,
      data: "",
    }
  # ============================================
  # PAINT AI FEATURES — Group Policy path (Policies\Microsoft\Paint)
  # ============================================
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Paint',
      value: "DisableImageCreator",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Paint',
      value: "DisableCocreator",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Paint',
      value: "DisableGenerativeFill",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Paint',
      value: "DisableGenerativeErase",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Paint',
      value: "DisableRemoveBackground",
      type: REG_DWORD,
      data: "1",
    }
  # ============================================
  # CLOUD CONTENT — disable consumer account AI recommendations
  # ============================================
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\CloudContent',
      value: "DisableConsumerAccountStateContent",
      type: REG_DWORD,
      data: "1",
    }
  # ============================================
  # MICROSOFT EDGE — disable Copilot & AI features
  # ============================================
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Edge',
      value: "CopilotCDPPageContext",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Edge',
      value: "CopilotPageContext",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Edge',
      value: "HubsSidebarEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Edge',
      value: "EdgeEntraCopilotPageContext",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Edge',
      value: "Microsoft365CopilotChatIconEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Edge',
      value: "EdgeHistoryAISearchEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Edge',
      value: "ComposeInlineEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Edge',
      value: "GenAILocalFoundationalModelSettings",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Edge',
      value: "BuiltInAIAPIsEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Edge',
      value: "AIGenThemesEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Edge',
      value: "DevToolsGenAiSettings",
      type: REG_DWORD,
      data: "2",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Edge',
      value: "ShareBrowsingHistoryWithCopilotSearchAllowed",
      type: REG_DWORD,
      data: "0",
    }
  # ============================================
  # OFFICE AI — disable Copilot and AI training
  # ============================================
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Policies\Microsoft\office\16.0\common\ai\training',
      value: "optionalconnectedexperiencesenabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Policies\Microsoft\office\16.0\common\privacy',
      value: "controllerconnectedservicesenabled",
      type: REG_DWORD,
      data: "2",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Policies\Microsoft\office\16.0\common\privacy',
      value: "usercontentdisabled",
      type: REG_DWORD,
      data: "2",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Policies\Microsoft\office\16.0\common\ai',
      value: "contentsafetyserviceenabled",
      type: REG_DWORD,
      data: "0",
    }  # Word / Excel / OneNote Copilot
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Office\16.0\Word\Options',
      value: "EnableCopilot",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Office\16.0\Excel\Options',
      value: "EnableCopilot",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Office\16.0\OneNote\Options\Other',
      value: "EnableCopilot",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Office\16.0\OneNote\Options\Other',
      value: "EnableCopilotNotebooks",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Office\16.0\OneNote\Options\Other',
      value: "EnableCopilotSkittle",
      type: REG_DWORD,
      data: "0",
    }
  # ============================================
  # COPILOT SHELL — disable Bing Chat and Copilot
  # ============================================
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Windows\Shell\Copilot',
      value: "IsCopilotAvailable",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Windows\Shell\Copilot\BingChat',
      value: "IsUserEligible",
      type: REG_DWORD,
      data: "0",
    }  # Copilot / Office Hub Microphone
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\microphone\Microsoft.Copilot_8wekyb3d8bbwe',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\microphone\Microsoft.MicrosoftOfficeHub_8wekyb3d8bbwe',
      value: "Value",
      type: REG_SZ,
      data: "Deny",
    }  # Copilot nudges
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\Advanced',
      value: "ShowCopilotNudges",
      type: REG_DWORD,
      data: "0",
    }