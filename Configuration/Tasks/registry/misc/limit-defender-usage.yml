---
title: Limit Defender usage
description: Microsoft Defender real-time scan aggressiveness reduced — CPU capped, catch-up scans disabled, scan only when idle, scheduled scans disabled, common paths excluded
privilege: TrustedInstaller
actions:
  # === CPU Limiting ===
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Scan',
      value: "AvgCPULoadFactor",
      type: REG_DWORD,
      data: "25",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Scan',
      value: "ScanAvgCPULoadFactor",
      type: REG_DWORD,
      data: "25",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Scan',
      value: "LowPriority",
      type: REG_DWORD,
      data: "1",
    }
  # === Disable Scheduled Scans ===
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Scan',
      value: "DisableScheduledScan",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Scan',
      value: "ScheduleDay",
      type: REG_DWORD,
      data: "8",
    }
  - !registryValue: {
      path: 'HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows Defender\Schedule',
      value: "ScheduleDay",
      type: REG_DWORD,
      data: "8",
    }
  # === Disable Catch-up Scans (after missed scheduled scan) ===
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Scan',
      value: "DisableCatchupFullScan",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Scan',
      value: "DisableCatchupQuickScan",
      type: REG_DWORD,
      data: "1",
    }
  # === Scan Only When Idle ===
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Scan',
      value: "ScanOnlyIfIdle",
      type: REG_DWORD,
      data: "1",
    }
  # === Disable Restore Point Before Scan (avoids disk I/O spike) ===
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Scan',
      value: "DisableRestorePoint",
      type: REG_DWORD,
      data: "1",
    }
  # === Disable IOAV (Download Scanning) — real-time already covers this ===
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Real-Time Protection',
      value: "DisableIOAVProtection",
      type: REG_DWORD,
      data: "1",
    }
  # === Real-Time Scan Aggressiveness — only scan on write (not read) ===
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Real-Time Protection',
      value: "DisableOnAccessProtection",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Real-Time Protection',
      value: "DisableScanOnRealtimeEnable",
      type: REG_DWORD,
      data: "1",
    }
  # === Reduce Defender Signature Update Frequency ===
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Signature Updates',
      value: "ForceUpdateFromMU",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Signature Updates',
      value: "SignatureUpdateInterval",
      type: REG_DWORD,
      data: "24",
    }