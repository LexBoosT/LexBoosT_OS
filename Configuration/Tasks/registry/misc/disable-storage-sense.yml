---
title: Disable Storage Sense
description: Disables Storage Sense automatic disk cleanup (was incorrectly titled "Limit Defender usage" — AUDIT fix)
privilege: TrustedInstaller
actions:
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\StorageSense\Parameters\StoragePolicy',
      value: "01",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\StorageSense',
      value: "AllowStorageSenseGlobal",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Policies\Microsoft\Windows\StorageSense',
      value: "AllowStorageSenseGlobal",
      type: REG_DWORD,
      data: "0",
    }