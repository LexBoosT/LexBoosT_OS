---
title: Optimize Mouse and Keyboard Settings
description: Tweak mouse cursor speed, keyboard response and input settings
privilege: TrustedInstaller
actions:
  # Mouse Cursor Speed
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Input\Settings\ControllerProcessor\CursorSpeed',
      value: "CursorSensitivity",
      type: REG_DWORD,
      data: "10000",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Input\Settings\ControllerProcessor\CursorSpeed',
      value: "CursorUpdateInterval",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Input\Settings\ControllerProcessor\CursorSpeed',
      value: "IRRemoteNavigationDelta",
      type: REG_DWORD,
      data: "1",
    }

  # Keyboard Response
  - !registryValue: {
      path: 'HKCU\Control Panel\Accessibility\Keyboard Response',
      value: "DelayBeforeAcceptance",
      type: REG_SZ,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\Control Panel\Accessibility\Keyboard Response',
      value: "BounceTime",
      type: REG_SZ,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\Control Panel\Accessibility\Keyboard Response',
      value: "Last BounceKey Setting",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\Control Panel\Accessibility\Keyboard Response',
      value: "Last Valid Delay",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\Control Panel\Accessibility\Keyboard Response',
      value: "Last Valid Repeat",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\Control Panel\Accessibility\Keyboard Response',
      value: "Last Valid Wait",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\Control Panel\Accessibility\Keyboard Response',
      value: "KeyboardDelay",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\Control Panel\Accessibility\Keyboard Response',
      value: "AutoRepeatDelay",
      type: REG_SZ,
      data: "180",
    }
  - !registryValue: {
      path: 'HKCU\Control Panel\Accessibility\Keyboard Response',
      value: "AutoRepeatRate",
      type: REG_SZ,
      data: "2",
    }
  - !registryValue: {
      path: 'HKCU\Control Panel\Accessibility\Keyboard Response',
      value: "Flags",
      type: REG_SZ,
      data: "122",
    }

  # === Disable Sticky Keys — Source: WinUtil / Customize Preferences
  # Flags=506 désactive le déclenchement de StickyKeys par Shift×5
  # (interruption indésirable en gaming)
  - !registryValue: {
      path: 'HKCU\Control Panel\Accessibility\StickyKeys',
      value: "Flags",
      type: REG_DWORD,
      data: "506",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Control Panel\Accessibility\StickyKeys',
      value: "Flags",
      type: REG_DWORD,
      data: "506",
    }

  # === Disable Toggle Keys (Caps Lock alert)
  - !registryValue: {
      path: 'HKCU\Control Panel\Accessibility\ToggleKeys',
      value: "Flags",
      type: REG_DWORD,
      data: "58",
    }

  # === Disable Filter Keys
  - !registryValue: {
      path: 'HKCU\Control Panel\Accessibility\Keyboard Response',
      value: "Flags",
      type: REG_SZ,
      data: "122",
    }

  # Input Buffers
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\mouclass\Parameters',
      value: "MouseDataQueueSize",
      type: REG_DWORD,
      data: "22",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\kbdclass\Parameters',
      value: "KeyboardDataQueueSize",
      type: REG_DWORD,
      data: "22",
    }

  # Mouse Precision
  - !registryValue: {
      path: 'HKCU\Control Panel\Mouse',
      value: "MouseSensitivity",
      type: REG_SZ,
      data: "10",
    }
  # === MouseHoverTime = 10ms — Hover delay UI
  # Source : scribd regedit guide, forums 2024-2025
  # Réduit le délai de survol de 400ms (défaut) à 10ms.
  # Accélère l'apparition des tooltips et des menus sur survol.
  - !registryValue: {
      path: 'HKCU\Control Panel\Mouse',
      value: "MouseHoverTime",
      type: REG_SZ,
      data: "200",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Control Panel\Mouse',
      value: "MouseHoverTime",
      type: REG_SZ,
      data: "200",
    }
  - !registryValue: {
      path: 'HKCU\Control Panel\Mouse',
      value: "MouseSpeed",
      type: REG_SZ,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\Control Panel\Mouse',
      value: "MouseThreshold1",
      type: REG_SZ,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\Control Panel\Mouse',
      value: "MouseThreshold2",
      type: REG_SZ,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\Control Panel\Mouse',
      value: "MouseTrails",
      type: REG_SZ,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\Control Panel\Mouse',
      value: "DoubleClickSpeed",
      type: REG_SZ,
      data: "350",
    }
  - !registryValue: {
      path: 'HKCU\Control Panel\Mouse',
      value: "SwapMouseButtons",
      type: REG_SZ,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\Control Panel\Mouse',
      value: "RawInput",
      type: REG_SZ,
      data: "1",
    }
  - !registryValue: {
      path: 'HKCU\Control Panel\Mouse',
      value: "SnapToDefaultButton",
      type: REG_SZ,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\Control Panel\Mouse',
      value: "MouseDelay",
      type: REG_SZ,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\Control Panel\Mouse',
      value: "ActiveWindowTracking",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\Control Panel\Mouse',
      value: "RawMouseThrottleEnabled",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKCU\Control Panel\Mouse',
      value: "RawMouseThrottleForced",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKCU\Control Panel\Mouse',
      value: "RawMouseThrottleDuration",
      type: REG_DWORD,
      data: "20",
    }
  - !registryValue: {
      path: 'HKCU\Control Panel\Mouse',
      value: "RawMouseThrottleLeeway",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Windows',
      value: "RITdemonTimerPowerSaveElapse",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Windows',
      value: "RITdemonTimerPowerSaveCoalescing",
      type: REG_DWORD,
      data: "0",
    }

  # Mouse Smoothing
  - !powerShell:
      command: '.\\Scripts\\Performance\\OPTIMIZE-MOUSESMOOTHINGCURVES.PS1'
      exeDir: true
      runas: currentUserElevated
      wait: true
      errorAction: Ignore

  # Keyboard Settings
  - !registryValue: {
      path: 'HKCU\Control Panel\Keyboard',
      value: "KeyboardDelay",
      type: REG_SZ,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\Control Panel\Keyboard',
      value: "KeyboardSpeed",
      type: REG_SZ,
      data: "31",
    }
  # NUM Lock on at startup enabled
  - !registryValue: {
      path: 'HKCU\Control Panel\Keyboard',
      value: "InitialKeyboardIndicators",
      type: REG_SZ,
      data: "2",
    }

  # Cursor Magnetism
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Input\Settings\ControllerProcessor\CursorMagnetism',
      value: "AttractionRectInsetInDIPS",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Input\Settings\ControllerProcessor\CursorMagnetism',
      value: "DistanceThresholdInDIPS",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Input\Settings\ControllerProcessor\CursorMagnetism',
      value: "MagnetismDelayInMilliseconds",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Input\Settings\ControllerProcessor\CursorMagnetism',
      value: "MagnetismUpdateIntervalInMilliseconds",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Input\Settings\ControllerProcessor\CursorMagnetism',
      value: "VelocityInDIPSPerSecond",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\kbdclass\Parameters',
      value: "KeyboardTransmitTimeout",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\kbdclass\Parameters',
      value: "LayeredLatency",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\mouclass\Parameters',
      value: "KeyboardTransmitTimeout",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\mouclass\Parameters',
      value: "LayeredLatency",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\services\kbdclass\Parameters',
      value: "ConnectMultiplePorts",
      data: "0",
      type: REG_DWORD,
    }
  - !registryValue: {
      path: 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\services\mouclass\Parameters',
      value: "ConnectMultiplePorts",
      data: "0",
      type: REG_DWORD,
    }
  - !registryValue: {
      path: 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\services\kbdclass\Parameters',
      value: "KeyboardDeviceBaseName",
      data: "KeyboardClass",
      type: REG_SZ,
    }
  - !registryValue: {
      path: 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\services\kbdclass\Parameters',
      value: "MaximumPortsServiced",
      data: "3",
      type: REG_DWORD,
    }
  - !registryValue: {
      path: 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\services\mouclass\Parameters',
      value: "MaximumPortsServiced",
      data: "3",
      type: REG_DWORD,
    }
  - !registryValue: {
      path: 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\services\kbdclass\Parameters',
      value: "SendOutputToAllPorts",
      data: "0",
      type: REG_DWORD,
    }
  - !registryValue: {
      path: 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\services\mouclass\Parameters',
      value: "SendOutputToAllPorts",
      data: "0",
      type: REG_DWORD,
    }
  - !registryValue: {
      path: 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\services\kbdclass\Parameters',
      value: "WppRecorder_UseTimeStamp",
      data: "0",
      type: REG_DWORD,
    }
  - !registryValue: {
      path: 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\services\mouclass\Parameters',
      value: "WppRecorder_UseTimeStamp",
      data: "0",
      type: REG_DWORD,
    }
  - !registryValue: {
      path: 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\services\mouhid\Parameters',
      value: "WppRecorder_UseTimeStamp",
      data: "0",
      type: REG_DWORD,
    }
  - !registryValue: {
      path: 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\services\kbdhid\Parameters',
      value: "WppRecorder_UseTimeStamp",
      data: "0",
      type: REG_DWORD,
    }
  - !registryValue: {
      path: 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\services\kbdclass\Parameters',
      # ThreadPriority = 15 (HIGH) — pas REALTIME(31) qui cause DPC storms sous charge
      # Cohérent avec FINALIZE2.cmd qui override à 15
      value: "ThreadPriority",
      data: "15",
      type: REG_DWORD,
    }
  - !registryValue: {
      path: 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\services\mouclass\Parameters',
      # ThreadPriority = 15 (HIGH) — pas REALTIME(31) qui cause DPC storms sous charge
      value: "ThreadPriority",
      data: "15",
      type: REG_DWORD,
    }
  - !registryValue: {
      path: 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\services\kbdclass\Parameters',
      value: "WppRecorder_TraceGuid",
      data: "{09281f1f-f66e-485a-99a2-91638f782c49}",
      type: REG_SZ,
    }
  - !registryValue: {
      path: 'HKEY_CURRENT_USER\Control Panel\Keyboard',
      value: "Flags",
      data: "27",
      type: REG_SZ,
    }
  - !registryValue: {
      path: 'HKEY_CURRENT_USER\Control Panel\Desktop',
      value: "CursorBlinkRate",
      data: "200",
      type: REG_SZ,
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\mouhid\Parameters',
      value: "TreatAbsolutePointerAsAbsolute",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\mouhid\Parameters',
      value: "TreatAbsoluteAsRelative",
      type: REG_DWORD,
      data: "0",
    }

  # Disable touchscreen palm rejection delay zones
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Windows\Input\DelayZonePalmRejection',
      value: "RejectionEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Windows\Input\DelayZonePalmRejection',
      value: "DisableTimeThreshold",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Windows\Input\DelayZonePalmRejection',
      value: "DelayZonePalmRejectionExtensionSizeDips",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Windows\Input\DelayZonePalmRejection',
      value: "DelayZonePalmRejectionThresholdMS",
      type: REG_DWORD,
      data: "0",
    }
