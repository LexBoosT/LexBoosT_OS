---
title: Configure Explorer -> Start Menu
description: Configure Start Menu
privilege: TrustedInstaller
actions:
  # === Pin items to the Start Menu
  # -----> MS Store, Settings, Notepad, Paint, File Explorer, Calculator, Photos, Xbox, Copilot
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\current\device\Start',
      value: "ConfigureStartPins",
      type: REG_SZ,
      data: '{"pinnedList":[{"packagedAppId":"Microsoft.WindowsStore_8wekyb3d8bbwe!App"},{"packagedAppId":"windows.immersivecontrolpanel_cw5n1h2txyewy!microsoft.windows.immersivecontrolpanel"},{"packagedAppId":"Microsoft.WindowsNotepad_8wekyb3d8bbwe!App"},{"packagedAppId":"Microsoft.Paint_8wekyb3d8bbwe!App"},{"desktopAppLink":"%APPDATA%\\Microsoft\\Windows\\Start Menu\\Programs\\File Explorer.lnk"},{"packagedAppId":"Microsoft.WindowsCalculator_8wekyb3d8bbwe!App"},{"packagedAppId":"Microsoft.XboxApp_8wekyb3d8bbwe!App"}]}',
    }

  # === Choose which folders appear on Start
  # ------> "_ProviderSet"=dword:00000000 == Allows User Toggle
  # ------> "_ProviderSet"=dword:00000001 == Blocks User Toggle
  # ------> "AllowPinnedFolderXXXXXXXXXXXX"=dword:00000001 == Show
  # ------> "AllowPinnedFolderXXXXXXXXXXXX"=dword:00000000 == Hide
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\current\device\Start',
      value: "AllowPinnedFolderDocuments",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\current\device\Start',
      value: "AllowPinnedFolderDocuments_ProviderSet",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\current\device\Start',
      value: "AllowPinnedFolderDownloads",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\current\device\Start',
      value: "AllowPinnedFolderDownloads_ProviderSet",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\current\device\Start',
      value: "AllowPinnedFolderFileExplorer",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\current\device\Start',
      value: "AllowPinnedFolderFileExplorer_ProviderSet",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\current\device\Start',
      value: "AllowPinnedFolderHomeGroup_ProviderSet",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\current\device\Start',
      value: "AllowPinnedFolderNetwork",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\current\device\Start',
      value: "AllowPinnedFolderNetwork_ProviderSet",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\current\device\Start',
      value: "AllowPinnedFolderPersonalFolder",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\current\device\Start',
      value: "AllowPinnedFolderPersonalFolder_ProviderSet",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\current\device\Start',
      value: "AllowPinnedFolderPictures",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\current\device\Start',
      value: "AllowPinnedFolderPictures_ProviderSet",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\current\device\Start',
      value: "AllowPinnedFolderSettings",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\current\device\Start',
      value: "AllowPinnedFolderSettings_ProviderSet",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\current\device\Start',
      value: "AllowPinnedFolderVideos",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\current\device\Start',
      value: "AllowPinnedFolderVideos_ProviderSet",
      type: REG_DWORD,
      data: "0",
    }

  # === Do not use the search-based method when resolving shell shortcuts - Enabled
  # ------> https://admx.help/?Category=Windows_11_2022&Policy=Microsoft.Policies.StartMenu::NoResolveSearch
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Policies\Explorer',
      value: "NoResolveSearch",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\Policies\Explorer',
      value: "NoResolveSearch",
      type: REG_DWORD,
      data: "1",
    }

  # ============================================
  # WIN11 24H2 — NOUVEAUX TWEAKS START MENU
  # ============================================

  # Désactive les recommandations IA Iris dans le Start Menu (24H2+)
  # Supprime les suggestions "recommandées" qui font des appels réseau constants
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced',
      value: "Start_IrisRecommendations",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced',
      value: "Start_IrisRecommendations",
      type: REG_DWORD,
      data: "0",
    }

  # === Hide Recommended Section
  - !status: {
      status: "Hide Recommended Section",
      option: "hide-s",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\current\device\Start',
      value: "HideRecommendedSection",
      type: REG_DWORD,
      data: "1",
      option: "hide-s",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PolicyManager\current\device\Education',
      value: "IsEducationEnvironment",
      type: REG_DWORD,
      data: "1",
      option: "hide-s",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\Explorer',
      value: "HideRecommendedSection",
      type: REG_DWORD,
      data: "1",
      option: "hide-s",
    }
  - !registryValue: {
    path: 'HKCU\SOFTWARE\Policies\Microsoft\Windows\Explorer',
    value: "HideRecommendedSection",
    data: "1",
    type: REG_DWORD,
    option: "hide-s",
    }

  # Phone Link — désactivé (service CDP et processus arrière-plan inutiles)
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Mobility\PhoneLink',
      value: "PhoneLinkEnabled",
      type: REG_DWORD,
      data: "0",
    }

  # Widgets — désactivation persistante via GPO (le taskKill seul ne suffit pas)
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Dsh',
      value: "AllowNewsAndInterests",
      type: REG_DWORD,
      data: "0",
    }

  # ============================================
  # HKCU: START MENU — recent/frequent lists
  # ============================================
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Start',
      value: "ShowRecentList",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Start',
      value: "ShowFrequentList",
      type: REG_DWORD,
      data: "0",
    }
  # ============================================
  # HKCU: START MENU — track docs
  # ============================================
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\Advanced',
      value: "Start_TrackDocs",
      type: REG_DWORD,
      data: "0",
    }