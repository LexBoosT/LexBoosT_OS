---
title: Configure Windows Settings
description: Configure Windows Settings
privilege: TrustedInstaller
actions:
  # === Hide stripped components from Settings
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer',
      value: "SettingsPageVisibility",
      type: REG_SZ,
      data: "hide:privacy-feedback;home",
    }

  # === Hide the Windows Update icon on the taskbar - Off
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\WindowsUpdate\UX\Settings',
      value: "TrayIconVisibility",
      type: REG_DWORD,
      data: "0",
    }

  # ==============
  # === System ===
  # ==============

  # === Adjust Tablet mode to always desktop mode.
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ImmersiveShell',
      value: "SignInMode",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ImmersiveShell',
      value: "TabletMode",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ImmersiveShell',
      value: "ConvertibleSlateModePromptPreference",
      type: REG_DWORD,
      data: "2",
    }
  # DEFAULT USER
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ImmersiveShell',
      value: "SignInMode",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ImmersiveShell',
      value: "TabletMode",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ImmersiveShell',
      value: "ConvertibleSlateModePromptPreference",
      type: REG_DWORD,
      data: "2",
    }

  # === Hide app icons on the taskbar in tablet mode - Off
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced',
      value: "TaskbarAppsVisibleInTabletMode",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced',
      value: "TaskbarAppsVisibleInTabletMode",
      type: REG_DWORD,
      data: "1",
    }

  # === Automatically hide the taskbar in tablet mode - Off
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced',
      value: "TaskbarAutoHideInTabletMode",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced',
      value: "TaskbarAutoHideInTabletMode",
      type: REG_DWORD,
      data: "0",
    }

  # ======> Multitasking
  # === Show suggestions occasionally in your timeline - Off
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-353698Enabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-353698Enabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SystemPaneSuggestionsEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SystemPaneSuggestionsEnabled",
      type: REG_DWORD,
      data: "0",
    }

  # ======> Clipboard
  # === Clipboard History - On
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Clipboard',
      value: "EnableClipboardHistory",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Clipboard',
      value: "EnableClipboardHistory",
      type: REG_DWORD,
      data: "1",
    }

  # === Allow Clipboard History — Enabled (requis pour Win+V)
  # ------> Win+V ne fonctionne pas si cette valeur est à 0.
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\System',
      value: "AllowClipboardHistory",
      type: REG_DWORD,
      data: "1",
    }

  # === Allow Clipboard synchronization across devices — Disabled
  # ------> Cross-device sync (téléphone, cloud) : désactivé pour la privacy sur PC gaming.
  # ------> N'affecte PAS Win+V (historique local). AllowClipboardHistory=1 suffit pour Win+V.
  # ------> Cohérent avec FINALIZE3.cmd qui désactive aussi cette valeur.
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\System',
      value: "AllowCrossDeviceClipboard",
      type: REG_DWORD,
      data: "0",
    }

  # ===============
  # === Devices ===
  # ===============

  # ======> Typing

  # === Autocorrect misspelled words - Off
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\TabletTip\1.7',
      value: "EnableAutocorrection",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\TabletTip\1.7',
      value: "EnableAutocorrection",
      type: REG_DWORD,
      data: "0",
    }

  # === Highlight misspelled words - Off
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\TabletTip\1.7',
      value: "EnableSpellchecking",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\TabletTip\1.7',
      value: "EnableSpellchecking",
      type: REG_DWORD,
      data: "0",
    }

  # === Show text suggestions as I type on the software keyboard - Off
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\TabletTip\1.7',
      value: "EnableTextPrediction",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\TabletTip\1.7',
      value: "EnableTextPrediction",
      type: REG_DWORD,
      data: "0",
    }

  # === Add a space after I choose text suggestion - Off
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\TabletTip\1.7',
      value: "EnablePredictionSpaceInsertion",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\TabletTip\1.7',
      value: "EnablePredictionSpaceInsertion",
      type: REG_DWORD,
      data: "0",
    }

  # === Add a full stop after I double-tap the spacebar - Off
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\TabletTip\1.7',
      value: "EnableDoubleTapSpace",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\TabletTip\1.7',
      value: "EnableDoubleTapSpace",
      type: REG_DWORD,
      data: "0",
    }

  # === Typing insights - Off
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Input\Settings',
      value: "InsightsEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Input\Settings',
      value: "InsightsEnabled",
      type: REG_DWORD,
      data: "0",
    }

  # === Show text suggestions as I type - Off
  # ------> Hardware keyboard
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Input\Settings',
      value: "EnableHwkbTextPrediction",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Input\Settings',
      value: "EnableHwkbTextPrediction",
      type: REG_DWORD,
      data: "0",
    }

  # === Autocorrect misspelled words I type - Off
  # ------> Hardware keyboard
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Input\Settings',
      value: "EnableHwkbAutocorrection",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Input\Settings',
      value: "EnableHwkbAutocorrection",
      type: REG_DWORD,
      data: "0",
    }

  # === Show text suggestions based on the recognized languages that you are typing - Off
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Input\Settings',
      value: "MultilingualEnabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Input\Settings',
      value: "MultilingualEnabled",
      type: REG_DWORD,
      data: "0",
    }

  # ======> AutoPlay
  # === Use AutoPlay for all media and devices - Off
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\AutoplayHandlers',
      value: "DisableAutoplay",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\Explorer\AutoplayHandlers',
      value: "DisableAutoplay",
      type: REG_DWORD,
      data: "1",
    }

  # =======================
  # === Personalization ===
  # =======================

  # ======> Colors
  # === Choose your color - Custom colors (designed for UI)
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Accents\0\Theme0',
      value: "Color",
      type: REG_DWORD,
      data: "4279374354",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Accents\0\Theme1',
      value: "Color",
      type: REG_DWORD,
      data: "4278190294",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Accents\1\Theme0',
      value: "Color",
      type: REG_DWORD,
      data: "4294926889",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Accents\1\Theme1',
      value: "Color",
      type: REG_DWORD,
      data: "4282117119",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Accents\2\Theme0',
      value: "Color",
      type: REG_DWORD,
      data: "4278229247",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Accents\2\Theme1',
      value: "Color",
      type: REG_DWORD,
      data: "4283680768",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Accents\3\Theme0',
      value: "Color",
      type: REG_DWORD,
      data: "4294901930",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Accents\3\Theme1',
      value: "Color",
      type: REG_DWORD,
      data: "4294967064",
    }

  # === Choose your default app mode - Dark (theme)
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize',
      value: "AppsUseLightTheme",
      type: REG_DWORD,
      data: "0",
      option: "configure-darkmode",
      weight: 70,
    }
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize',
      value: "SystemUsesLightTheme",
      type: REG_DWORD,
      data: "0",
      option: "configure-darkmode",
      weight: 50,
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize',
      value: "AppsUseLightTheme",
      type: REG_DWORD,
      data: "0",
      option: "configure-darkmode",
      weight: 70,
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize',
      value: "SystemUsesLightTheme",
      type: REG_DWORD,
      data: "0",
      option: "configure-darkmode",
      weight: 50,
    }

  ## if dark mode is deselected, then revert to light mode
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize',
      value: "AppsUseLightTheme",
      type: REG_DWORD,
      data: "1",
      option: "!configure-darkmode",
      weight: 70,
    }
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize',
      value: "SystemUsesLightTheme",
      type: REG_DWORD,
      data: "1",
      option: "!configure-darkmode",
      weight: 50,
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize',
      value: "AppsUseLightTheme",
      type: REG_DWORD,
      data: "1",
      option: "!configure-darkmode",
      weight: 70,
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize',
      value: "SystemUsesLightTheme",
      type: REG_DWORD,
      data: "1",
      option: "!configure-darkmode",
      weight: 50,
    }
  ##

  # ======> Start
  # === Show suggestions occasionally in Start - Off
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-338388Enabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager',
      value: "SubscribedContent-338388Enabled",
      type: REG_DWORD,
      data: "0",
    }

  # ============
  # === Apps ===
  # ============

  # ======> Offline maps

  # === Metered connections - Off
  # ------> If this is turned off, maps only download over free WLAN or unlimited mobile date. (You might incur additional charges if you turn it on.)
  - !registryValue: {
      path: 'HKLM\SYSTEM\Maps',
      value: "UpdateOnlyOnWifi",
      type: REG_DWORD,
      data: "1",
    }

  # === Automatically update maps - Off
  - !registryValue: {
      path: 'HKLM\SYSTEM\Maps',
      value: "AutoUpdateEnabled",
      type: REG_DWORD,
      data: "0",
    }

  # ================
  # === Accounts ===
  # ================

  # ======> Sync your settings

  # === Do not sync app settings - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\SettingSync',
      value: "DisableApplicationSettingSync",
      type: REG_DWORD,
      data: "2",
    }

  # === Allow users to turn "app settings" syncing on - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\SettingSync',
      value: "DisableApplicationSettingSyncUserOverride",
      type: REG_DWORD,
      data: "1",
    }

  # === Do not sync - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Wow6432Node\Policies\Microsoft\Windows\SettingSync',
      value: "DisableSettingSync",
      type: REG_DWORD,
      data: "2",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\SettingSync',
      value: "DisableSettingSync",
      type: REG_DWORD,
      data: "2",
    }

  # === Allow users to turn syncing on - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\SettingSync',
      value: "DisableSettingSyncUserOverride",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Wow6432Node\Policies\Microsoft\Windows\SettingSync',
      value: "DisableSettingSyncUserOverride",
      type: REG_DWORD,
      data: "1",
    }

  # === Do not sync browser settings - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\SettingSync',
      value: "DisableWebBrowserSettingSync",
      type: REG_DWORD,
      data: "2",
    }

  # === Allow users to turn "browser" syncing on - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\SettingSync',
      value: "DisableWebBrowserSettingSyncUserOverride",
      type: REG_DWORD,
      data: "1",
    }

  # === Do not sync desktop personalization - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\SettingSync',
      value: "DisableDesktopThemeSettingSync",
      type: REG_DWORD,
      data: "2",
    }

  # === Allow users to turn "desktop personalization" syncing on - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\SettingSync',
      value: "DisableDesktopThemeSettingSyncUserOverride",
      type: REG_DWORD,
      data: "1",
    }

  # === Do not sync on metered connections - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\SettingSync',
      value: "DisableSyncOnPaidNetwork",
      type: REG_DWORD,
      data: "1",
    }

  # === Do not sync other Windows settings - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\SettingSync',
      value: "DisableWindowsSettingSync",
      type: REG_DWORD,
      data: "2",
    }

  # === Allow users to turn "other Windows settings" syncing on - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\SettingSync',
      value: "DisableWindowsSettingSyncUserOverride",
      type: REG_DWORD,
      data: "1",
    }

  # === Do not sync passwords - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\SettingSync',
      value: "DisableCredentialsSettingSync",
      type: REG_DWORD,
      data: "2",
    }

  # === Allow users to turn "passwords" syncing on - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\SettingSync',
      value: "DisableCredentialsSettingSyncUserOverride",
      type: REG_DWORD,
      data: "1",
    }

  # === Do not sync personalize - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\SettingSync',
      value: "DisablePersonalizationSettingSync",
      type: REG_DWORD,
      data: "2",
    }

  # === Allow users to turn "personalize" syncing on - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\SettingSync',
      value: "DisablePersonalizationSettingSyncUserOverride",
      type: REG_DWORD,
      data: "1",
    }

  # === Do not sync start settings - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\SettingSync',
      value: "DisableStartLayoutSettingSync",
      type: REG_DWORD,
      data: "2",
    }

  # ===  Allow users to turn "start layout" syncing on - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\SettingSync',
      value: "DisableStartLayoutSettingSyncUserOverride",
      type: REG_DWORD,
      data: "1",
    }

  # ===============
  # === Privacy ===
  # ===============

  # ======> General

  # === Let apps use advertising ID to make ads more interesting to you based on your app activity - Off
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\AdvertisingInfo',
      value: "Enabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\AdvertisingInfo',
      value: "Enabled",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\AdvertisingInfo',
      value: "Id",
      operation: delete,
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\AdvertisingInfo',
      value: "Id",
      operation: delete,
    }

  # === Turn off the advertising ID - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\AdvertisingInfo',
      value: "DisabledByGroupPolicy",
      type: REG_DWORD,
      data: "1",
    }

  # === Allow webistes to provide locally relevant content by accessing my language list - Off
  # ------> Do not let websites access local language list - Enabled
  - !registryValue: {
      path: 'HKCU\Control Panel\International\User Profile',
      value: "HttpAcceptLanguageOptOut",
      type: REG_DWORD,
      data: "1",
      weight: 50,
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Control Panel\International\User Profile',
      value: "HttpAcceptLanguageOptOut",
      type: REG_DWORD,
      data: "1",
      weight: 50,
    }

  # === Show me notifications in the Settings app - Off
  # ------> Found in 22631.3527
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\SystemSettings\AccountNotifications',
      value: "EnableAccountNotifications",
      type: REG_DWORD,
      data: "0",
      weight: 50,
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\SystemSettings\AccountNotifications',
      value: "EnableAccountNotifications",
      type: REG_DWORD,
      data: "0",
      weight: 50,
    }

    # === "Bitmap image" ===
  - !registryKey:
    path: 'HKCR\.bmp\ShellNew'
    operation: delete

  # === "Rich Text Document" ===
  - !registryKey:
    path: 'HKCR\.rtf\ShellNew'
    operation: delete

  # ======> Speech
  # === Online speech recognition - Off
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Speech_OneCore\Settings\OnlineSpeechPrivacy',
      value: "HasAccepted",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Speech_OneCore\Settings\OnlineSpeechPrivacy',
      value: "HasAccepted",
      type: REG_DWORD,
      data: "0",
    }

  # ======> Inking & typing personalization
  # === Getting to know you - Off
  # ------> https://www.tenforums.com/tutorials/118127-turn-off-inking-typing-personalization-windows-10-a.html
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\InputPersonalization',
      value: "RestrictImplicitInkCollection",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\InputPersonalization',
      value: "RestrictImplicitTextCollection",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Personalization\Settings',
      value: "AcceptedPrivacyPolicy",
      type: REG_DWORD,
      data: "0",
    }

  # === Turn off automatic learning - Enabled
  - !registryValue: {
      path: 'HKCU\Software\Policies\Microsoft\InputPersonalization',
      value: "RestrictImplicitInkCollection",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKCU\Software\Policies\Microsoft\InputPersonalization',
      value: "RestrictImplicitTextCollection",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\InputPersonalization',
      value: "RestrictImplicitInkCollection",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\InputPersonalization',
      value: "RestrictImplicitTextCollection",
      type: REG_DWORD,
      data: "1",
    }

  # ======> Diagnostics & feedback

  # === Diagnostic data - Disabled
  # ------> Disable Telemetry - Enabled
  # Can be found in src/Configuration/Tasks/registry/privacy/telemetry.yml

  # === Improve inking and typing recognition - Disabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\TextInput',
      value: "AllowLinguisticDataCollection",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Wow6432Node\Microsoft\Windows\CurrentVersion\Policies\TextInput',
      value: "AllowLinguisticDataCollection",
      type: REG_DWORD,
      data: "0",
    }

  # === Improve inking and typing recognition - Disabled
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Input\TIPC',
      value: "Enabled",
      type: REG_DWORD,
      data: "0",
