---
title: Sounds
description: Applies sound tweaks via registry values and SOUNDS.PS1
privilege: TrustedInstaller
actions:
  - !status: {status: 'Applying Sounds'}
  - !status: {status: "Configuring Sounds"}
  - !powerShell: {command: "New-ItemProperty -Path 'HKCU:\\AppEvents\\Schemes' -Name '(Default)' -Value '.None' -Force | Out-Null; Get-ChildItem -Path 'HKCU:\\AppEvents\\Schemes\\Apps' | Get-ChildItem | Get-ChildItem | Where-Object { $_.PSChildName -eq '.Current' } | Set-ItemProperty -Name '(Default)' -Value ''", runas: currentUserElevated, wait: true}
