---
title: Configure Security
description: Configure security settings
privilege: TrustedInstaller
actions:
  # === Hide the Account Protection page in Defender
  # ------> Everything it provides redirects to the Windows Settings anyway. Done for annoyance reduction.
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows Security Health\State',
      value: "AccountProtection_MicrosoftAccount_Disconnected",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKU\.DEFAULT\Software\Microsoft\Windows Security Health\State',
      value: "AccountProtection_MicrosoftAccount_Disconnected",
      type: REG_DWORD,
      data: "0",
    }

  # ==============================================
  # === Windows Defender Antivirus - Reporting ===
  # ==============================================

  # === Configure Watson events - Disabled
  # ------> https://docs.microsoft.com/en-us/windows/privacy/configure-windows-diagnostic-data-in-your-organization
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Reporting',
      value: "DisableGenericRePorts",
      type: REG_DWORD,
      data: "1",
    }

  # ==================================================================
  # === Windows Defender Antivirus - Security Intelligence Updates ===
  # ==================================================================

  # === Allow security intelligence updates when running on battery power - Disabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Signature Updates',
      value: "DisableScheduledSignatureUpdateOnBattery",
      type: REG_DWORD,
      data: "1",
    }

  # ====================================
  # === Windows Defender SmartScreen ===
  # ====================================

  # === Configure App Install Control - Enabled
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\SmartScreen',
      value: "ConfigureAppInstallControlEnabled",
      type: REG_DWORD,
      data: "1",
    }

  # === Pick one of the following settings - Turn off app recommendations
  # ------> https://admx.help/?Category=Windows_11_2022&Policy=Microsoft.Policies.SmartScreen::ConfigureAppInstallControl
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\SmartScreen',
      value: "ConfigureAppInstallControl",
      type: REG_SZ,
      data: "Anywhere",
    }
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\AppHost',
      value: "EnableWebContentEvaluation",
      type: REG_DWORD,
      data: "0",
    }

  # =============================================
  # UAC — disable consent prompt (admin)
  # =============================================
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System',
      value: "ConsentPromptBehaviorAdmin",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System',
      value: "PromptOnSecureDesktop",
      type: REG_DWORD,
      data: "0",
    }
  # =============================================
  # APP MODEL UNLOCK — disable sideloading loose files
  # =============================================
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock',
      value: "AllowDevelopmentWithoutDevLicense",
      type: REG_DWORD,
      data: "0",
    }
  # =============================================
  # POWERSHELL EXECUTION POLICY — Bypass (HKLM)
  # =============================================
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\PowerShell\1\ShellIds\Microsoft.PowerShell',
      value: "ExecutionPolicy",
      type: REG_SZ,
      data: "Bypass",
    }
  # =============================================
  # DISABLE LOCK WORKSTATION (keep enabled = 0)
  # =============================================
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon',
      value: "DisableLockWorkstation",
      type: REG_DWORD,
      data: "0",
    }
  # =============================================
  # DISABLE DCOM — WARNING: breaks Office COM interop, WMI remoting,
  # and many enterprise applications. Only disable if you are certain
  # no applications on this system require DCOM communication.
  # =============================================
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Ole',
      value: "EnableDCOM",
      type: REG_SZ,
      data: "N",
    }

  # =============================================
  # POWERSHELL EXECUTION POLICY (HKCU)
  # =============================================
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\PowerShell\1\ShellIds\Microsoft.PowerShell',
      value: "ExecutionPolicy",
      type: REG_SZ,
      data: "Bypass",
    }
  # === Set up Low Risk File Types (no SmartScreen warning for these)
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Policies\Associations',
      value: "LowRiskFileTypes",
      type: REG_SZ,
      data: ".avi;.bat;.cmd;.exe;.htm;.html;.lnk;.mpg;.mpeg;.mov;.mp3;.mp4;.mkv;.msi;.m3u;.rar;.reg;.txt;.vbs;.wav;.zip;.7z;.ps1",
    }
  # =============================================
  # WPAD — disable auto-proxy discovery (prevents MITM attacks)
  # =============================================
  # Clear cached WPAD configurations per user
  - !registryKey: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Internet Settings\Wpad',
      operation: delete,
    }
  # System-level WPAD disable via WinHTTP
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Internet Settings\WinHttp',
      value: "DisableWpad",
      type: REG_DWORD,
      data: "1",
    }
  # === Disable Open File Security Warning (Zones\3)
  - !registryValue: {
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Internet Settings\Zones\3',
      value: "1806",
      type: REG_DWORD,
      data: "0",
    }
