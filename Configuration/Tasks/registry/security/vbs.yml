---
title: Configure Security -> Virtualization Based Security
description: Configure VBS
privilege: TrustedInstaller
actions:
  # ⚠️ VBS ENABLED — Anti-cheat compatibility
  # Microsoft recommends disabling VBS for gaming:
  # https://support.microsoft.com/en-us/windows/options-to-optimize-gaming-performance-in-windows-11-a255f612-2949-4373-a566-ff6f3f474613
  #
  # ⚠️ ANTI-CHEAT COMPATIBILITY:
  # - Valorant (Vanguard): REQUIRES VBS ON + Memory Integrity ON.
  # - FaceIT AC: May require VBS ON for Level 3 matches.
  # - Easy Anti-Cheat / BattlEye: Generally unaffected.
  # - Most single-player games: Unaffected.
  #
  # Performance impact: ~2-5% FPS loss. Acceptable tradeoff for anti-cheat compatibility.

  # Enable VBS for anti-cheat compatibility
  # https://learn.microsoft.com/en-us/windows-hardware/design/device-experiences/oem-vbs

  - !registryValue: {
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\DeviceGuard',
      value: "EnableVirtualizationBasedSecurity",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\Policies\Microsoft\Windows\DeviceGuard',
      value: "HVCIMATRequired",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\CurrentControlSet\Control\DeviceGuard',
      value: "EnableVirtualizationBasedSecurity",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\ControlSet001\Control\DeviceGuard',
      value: "Locked",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\ControlSet001\Control\DeviceGuard',
      value: "RequirePlatformSecurityFeatures",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\ControlSet001\Control\DeviceGuard',
      value: "EnableVirtualizationBasedSecurity",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\ControlSet001\Control\DeviceGuard\Scenarios\HypervisorEnforcedCodeIntegrity',
      value: "Enabled",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\ControlSet001\Control\DeviceGuard\Scenarios\HypervisorEnforcedCodeIntegrity',
      value: "ChangedInBootCycle",
      operation: delete,
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\ControlSet001\Control\DeviceGuard\Scenarios\HypervisorEnforcedCodeIntegrity',
      value: "HVCIMATRequired",
      type: REG_DWORD,
      data: "1",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\ControlSet001\Control\DeviceGuard\Scenarios\HypervisorEnforcedCodeIntegrity',
      value: "Locked",
      type: REG_DWORD,
      data: "0",
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\ControlSet001\Control\DeviceGuard\Scenarios\HypervisorEnforcedCodeIntegrity',
      value: "WasEnabledBy",
      operation: delete,
    }
  - !registryValue: {
      path: 'HKLM\SYSTEM\ControlSet001\Control\Lsa',
      value: "LsaCfgFlags",
      type: REG_DWORD,
      data: "2",
    }