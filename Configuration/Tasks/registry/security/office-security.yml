---
title: Office Security Hardening
description: Disables VBA warnings, DDE, ActiveX, and PackagerPrompt for Office 12/14/15/16
privilege: TrustedInstaller
actions:
  - !status: {
      status: 'Hardening Office security',
    }

  # Office 12.0
  - !registryKey: {
      path: 'HKCU\SOFTWARE\Microsoft\Office',
      operation: add,
    }
  - !registryKey: {
      path: 'HKCU\SOFTWARE\Microsoft\Office\12.0',
      operation: add,
    }
  - !registryKey: {
      path: 'HKCU\SOFTWARE\Microsoft\Office\12.0\Excel',
      operation: add,
    }
  - !registryKey: {
      path: 'HKCU\SOFTWARE\Microsoft\Office\12.0\Excel\Security',
      operation: add,
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Office\12.0\Excel\Security',
      value: "PackagerPrompt",
      type: REG_DWORD,
      data: "2",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Office\12.0\Excel\Security',
      value: "VBAWarnings",
      type: REG_DWORD,
      data: "4",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Office\12.0\Excel\Security',
      value: "WorkbookLinkWarnings",
      type: REG_DWORD,
      data: "2",
    }
  - !registryKey: {
      path: 'HKCU\SOFTWARE\Microsoft\Office\12.0\PowerPoint',
      operation: add,
    }
  - !registryKey: {
      path: 'HKCU\SOFTWARE\Microsoft\Office\12.0\PowerPoint\Security',
      operation: add,
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Office\12.0\PowerPoint\Security',
      value: "PackagerPrompt",
      type: REG_DWORD,
      data: "2",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Office\12.0\PowerPoint\Security',
      value: "VBAWarnings",
      type: REG_DWORD,
      data: "4",
    }
  - !registryKey: {
      path: 'HKCU\SOFTWARE\Microsoft\Office\12.0\Word',
      operation: add,
    }
  - !registryKey: {
      path: 'HKCU\SOFTWARE\Microsoft\Office\12.0\Word\Options',
      operation: add,
    }
  - !registryKey: {
      path: 'HKCU\SOFTWARE\Microsoft\Office\12.0\Word\Options\vpref',
      operation: add,
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Office\12.0\Word\Options\vpref',
      value: "fNoCalclinksOnopen_90_1",
      type: REG_DWORD,
      data: "1",
    }
  - !registryKey: {
      path: 'HKCU\SOFTWARE\Microsoft\Office\12.0\Word\Security',
      operation: add,
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Office\12.0\Word\Security',
      value: "PackagerPrompt",
      type: REG_DWORD,
      data: "2",
    }
  - !registryValue: {
      path: 'HKCU\SOFTWARE\Microsoft\Office\12.0\Word\Security',
      value: "VBAWarnings",
      type: REG_DWORD,
      data: "4",
    }

