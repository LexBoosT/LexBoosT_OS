---
title: Registry
description: LexBoosT OS registry configuration
privilege: TrustedInstaller
actions:
  # ============================================
  # PHASE 1: OS INFORMATION (Branding)
  # ============================================
  - !status: {status: 'Config OS Info'}
  - !task: {path: 'Tasks\registry\os-info\edition.yml'}
  - !task: {path: 'Tasks\registry\os-info\oem-info.yml'}

  # ============================================
  # PHASE 2: EXPLORER
  # ============================================
  - !status: {status: 'Config explorer'}
  - !task: {path: 'Tasks\registry\explorer.yml'}
  - !status: {status: 'Config search'}
  - !task: {path: 'Tasks\registry\search.yml'}
  - !status: {status: 'Config notifications'}
  - !task: {path: 'Tasks\registry\notifications.yml'}
  - !status: {status: 'Config gamebar'}
  - !task: {path: 'Tasks\registry\gamebar.yml'}
  - !status: {status: 'Config clipboard'}
  - !task: {path: 'Tasks\registry\clipboard.yml'}
  - !status: {status: 'Config themes'}
  - !task: {path: 'Tasks\registry\themes.yml'}
  - !status: {status: 'Config mouse'}
  - !task: {path: 'Tasks\registry\mouse.yml'}
  - !status: {status: 'Config keyboard'}
  - !task: {path: 'Tasks\registry\keyboard.yml'}
  - !status: {status: 'Config accessibility'}
  - !task: {path: 'Tasks\registry\accessibility.yml'}
  - !status: {status: 'Config dwm'}
  - !task: {path: 'Tasks\registry\dwm.yml'}
  - !status: {status: 'Config sounds'}
  - !task: {path: 'Tasks\registry\sounds.yml'}
  - !status: {status: 'Config ntfs'}
  - !task: {path: 'Tasks\registry\ntfs.yml'}
  - !status: {status: 'Config bcdedit'}
  - !task: {path: 'Tasks\registry\bcdedit.yml'}
  - !status: {status: 'Config gaming'}
  - !task: {path: 'Tasks\registry\gaming.yml'}
  - !status: {status: 'Config power'}
  - !task: {path: 'Tasks\registry\power.yml'}
  - !status: {status: 'Config mobsync'}
  - !task: {path: 'Tasks\registry\mobsync.yml'}
  - !status: {status: 'Config audio'}
  - !task: {path: 'Tasks\registry\audio.yml'}
  - !status: {status: 'Config graphics'}
  - !task: {path: 'Tasks\registry\graphics.yml'}
  - !status: {status: 'Config explorer menu'}
  - !task: {path: 'Tasks\registry\explorermenu.yml'}
  - !status: {status: 'Config location'}
  - !task: {path: 'Tasks\registry\location.yml'}
  - !status: {status: 'Config broker'}
  - !task: {path: 'Tasks\registry\broker.yml'}
  - !status: {status: 'Config remote'}
