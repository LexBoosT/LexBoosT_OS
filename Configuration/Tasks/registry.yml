  - !task: {path: 'Tasks\registry\security.yml', onUpgrade: false}
  - !status: {status: 'Config system', onUpgrade: false}
  - !task: {path: 'Tasks\registry\system.yml', onUpgrade: false}
  - !status: {status: 'Config network'}
  - !task: {path: 'Tasks\registry\network.yml'}
  - !status: {status: 'Config software', onUpgrade: false}
  - !task: {path: 'Tasks\registry\software.yml', onUpgrade: false}
  - !status: {status: 'Config ceip'}
  - !task: {path: 'Tasks\registry\ceip.yml'}
  - !status: {status: 'Config telemetry'}
