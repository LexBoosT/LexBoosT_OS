---
title: Packages
description: Removes system (WinSxS) packages
privilege: TrustedInstaller
option: "remove-appx-packages"
onUpgrade: false
actions:
  - !status: {
      status: "Removing system packages",
      onUpgrade: false,
    }
  # AppX Microsoft Teams
  # Seems legacy - not in 23H2
  - !taskKill: {
      name: "msteams*",
      ignoreErrors: true,
    }
  - !appx: {
      name: "MicrosoftTeams*",
      type: family,
    }
  - !registryValue: {
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Communications',
      value: "ConfigureChatAutoInstall",
      data: "0",
      type: REG_DWORD,
    }

  # New AppX Teams in 24H2
  - !taskKill: {
      name: "ms-teams*",
      ignoreErrors: true,
    }
  - !appx: {
      name: "MSTeams*",
      type: family,
    }
  - !appx: {
      name: "*MicrosoftTeams*",
      type: family,
    }

  # Other apps
  - !appx: {
      name: "Disney.37853FC22B2CE*",
      type: family,
    }
  - !appx: {
      name: "SpotifyAB.SpotifyMusic*",
      type: family,
    }
  # Mail and Calendar
  - !appx: {
      name: "microsoft.windowscommunicationsapps*",
      type: family,
    }
  # Paint 3D
  - !appx: {
      name: "Microsoft.MSPaint*",
      type: family,
    }
  # Tips (deprecated)
  - !appx: {
      name: "Microsoft.Getstarted*",
      type: family,
    }
  - !appx: {
      name: "MicrosoftCorporationII.MicrosoftFamily*",
      type: family,
    }
  - !appx: {
      name: "Microsoft.MixedReality.Portal*",
      type: family,
    }
  - !appx: {
      name: "Microsoft.BingSearch*",
      type: family,
    }
  - !appx: {
      name: "Microsoft.GetHelp*",
      type: family,
    }
  - !appx: {
      name: "Microsoft.Microsoft3DViewer*",
      type: family,
    }
  - !appx: {
      name: "Microsoft.MicrosoftOfficeHub*",
      type: family,
    }
  - !appx: {
      name: "Microsoft.MicrosoftSolitaireCollection*",
      type: family,
    }
  - !appx: {
      name: "Microsoft.MicrosoftStickyNotes*",
      type: family,
    }
  - !appx: {
      name: "Microsoft.Office.OneNote*",
      type: family,
    }
  - !appx: {
      name: "Microsoft.People*",
      type: family,
    }
  - !appx: {
      name: "Microsoft.SkypeApp*",
      type: family,
    }
  - !appx: {
      name: "Microsoft.WindowsAlarms*",
      type: family,
    }
  - !appx: {
      name: "Microsoft.WindowsCamera*",
      type: family,
    }
  - !appx: {
      name: "Microsoft.WindowsMaps*",
      type: family,
    }
  - !appx: {
      name: "Microsoft.WindowsSoundRecorder*",
      type: family,
    }

  # Clear caches of Client.CBS and more
  # Start menu cache is cleared later
  - !status: {
      status: "Clearing AppX caches",
      onUpgrade: false,
    }
  - !appx: {
      name: "*MicrosoftWindows.Client.CBS*",
      operation: clearCache,
    }
  - !appx: {
      name: "*Microsoft.Windows.Search*",
      operation: clearCache,
    }