---
title: AppX
privilege: TrustedInstaller
actions:
  - !status: {status: 'Removing AppX'}

  - !taskKill: {name: 'msteams*', ignoreErrors: true}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Communications', value: 'ConfigureChatAutoInstall', data: '0', type: REG_DWORD}

  # ============================================
  # Full AppX debloat — handled by APPX-REMOVER.PS1
  # Package list is read from APPX-REMOVE-LIST.TXT (single source of truth).
  # ============================================
  - !status: {status: 'Removing AppX Packages'}
  - !run:
      exeDir: true
      exe: 'powershell.exe'
      args: '-NoProfile -ExecutionPolicy Bypass -File ".\Scripts\APPX-REMOVER.PS1" -PackageCsv ".\Scripts\APPX-REMOVE-LIST.TXT" -AppxOnly -Force'
      runas: currentUserElevated
      wait: true
      weight: 100

  # Disable CrossDeviceResume scheduled task (specific to that feature)
  - !status: {status: 'Disabling CrossDevice'}
  - !run:
      exeDir: true
      exe: '.\Scripts\CROSSDEVICERESUME.CMD'
      runas: currentUserElevated
      wait: true
      weight: 200
