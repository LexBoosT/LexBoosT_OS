<?xml version="1.0" encoding="utf-8"?>
<Playbook>
  <Name>LexBoosT OS™</Name>
  <Username>By LexBoosT</Username>
  <Title>LexBoosT OS™</Title>
  <ShortDescription>For Windows 11 Only</ShortDescription>
  <Description>This Playbook will help you quickly deploy LexBoosT OS™ on your current system.</Description>
  <Details>Experience an ideal, lightweight and stable system, designed to enhance performance and privacy while ensuring compatibility.</Details>
  <ProgressText>LexBoosT OS™ is currently installing software, copying its configuration folders, and tweaking Windows. Please wait...</ProgressText>
  <Version>26.07</Version>
  <!-- <ProductCode></ProductCode> -->
  <UniqueId>4526fadc-8222-4089-88f7-ad4d321580d2</UniqueId>
  <Overhaul>true</Overhaul>
  <UpgradableFrom>any</UpgradableFrom>
  <SupportedBuilds>
    <string>26100</string>
    <string>26200</string>
    <string>26300</string>
    <string>28000</string>
  </SupportedBuilds>
  <Requirements>
    <Requirement>DefenderToggled</Requirement>
    <Requirement>Internet</Requirement>
    <Requirement>NoPendingUpdates</Requirement>
    <Requirement>NoAntivirus</Requirement>
    <Requirement>PluggedIn</Requirement>
  </Requirements>
  <UseKernelDriver>false</UseKernelDriver>
  <Git>https://github.com/LexBoosT/LexBoosT_OS/releases</Git>
  <Website>https://lexboost.github.io/LexBoosT_OS/</Website>
  <DonateLink>https://ko-fi.com/lexboostdev</DonateLink>
  <FeaturePages>
    <RadioImagePage Description="Do you want to make a Backup before installing?">
        <Options>
            <RadioImageOption None="true"/>
            <RadioImageOption>
                <Text>Yes</Text>
                <Name>backup</Name>
                <FileName>Backup</FileName>
                <GradientTopColor>#1A1A1A</GradientTopColor>
                <GradientBottomColor>#050505</GradientBottomColor>
            </RadioImageOption>
        </Options>
    </RadioImagePage>
    <CheckboxPage IsRequired="true"
      Description="Browsers Menu.">
      <Options>
        <CheckboxOption IsChecked="false">
          <Text>Remove Microsoft Edge</Text>
          <Name>remove-edge</Name>
        </CheckboxOption>
        <CheckboxOption IsChecked="false">
          <Text>Install Browser</Text>
          <Name>Browser</Name>
        </CheckboxOption>
      </Options>
    </CheckboxPage>
    <RadioImagePage CheckDefaultBrowser="true" DependsOn="Browser" Description="Please select a preferred browser.">
        <Options>
            <RadioImageOption None="true"/>
            <RadioImageOption>
                <Text>Brave</Text>
                <Name>Brave</Name>
                <FileName>Brave</FileName>
                <GradientTopColor>#A33401</GradientTopColor>
                <GradientBottomColor>#FFC481</GradientBottomColor>
            </RadioImageOption>
            <RadioImageOption>
                <Text>Firefox</Text>
                <Name>Firefox</Name>
                <FileName>Firefox</FileName>
                <GradientTopColor>#FFA500</GradientTopColor>
                <GradientBottomColor>#FF3300</GradientBottomColor>
            </RadioImageOption>
            <RadioImageOption>
                <Text>Vivaldi</Text>
                <Name>Vivaldi</Name>
                <FileName>Vivaldi</FileName>
                <GradientTopColor>#EF3939</GradientTopColor>
                <GradientBottomColor>#800000</GradientBottomColor>
            </RadioImageOption>
        </Options>
        <BottomLine Text="Privacy tests 🔒" Link="https://privacytests.org/"/>
    </RadioImagePage>
    <RadioImagePage DependsOn="Browser" Description="Please select a preferred browser, page 2.">
        <Options>
            <RadioImageOption None="true"/>
            <RadioImageOption>
                <Text>Chrome</Text>
                <Name>Chrome</Name>
                <FileName>Chrome</FileName>
                <GradientTopColor>#4285F4</GradientTopColor>
                <GradientBottomColor>#1A237E</GradientBottomColor>
            </RadioImageOption>
            <RadioImageOption>
                <Text>OperaGX</Text>
                <Name>OperaGX</Name>
                <FileName>OperaGX</FileName>
                <GradientTopColor>#7B2FBE</GradientTopColor>
                <GradientBottomColor>#3B0764</GradientBottomColor>
            </RadioImageOption>
            <RadioImageOption>
                <Text>Zen</Text>
                <Name>Zen</Name>
                <FileName>Zen</FileName>
                <GradientTopColor>#1A1A1A</GradientTopColor>
                <GradientBottomColor>#050505</GradientBottomColor>
            </RadioImageOption>
        </Options>
        <BottomLine Text="Privacy tests 🔒" Link="https://privacytests.org/"/>
    </RadioImagePage>
    <CheckboxPage IsRequired="true" Description="LexBoosT™ configuration options">
      <Options>
        <CheckboxOption IsChecked="true">
          <Text>LexBoosT OS™ Theme</Text>
          <Name>configure-theme</Name>
        </CheckboxOption>
        <CheckboxOption IsChecked="true">
          <Text>LexBoosT™ Visual Performance</Text>
          <Name>lex-visual</Name>
        </CheckboxOption>
        <CheckboxOption IsChecked="true">
          <Text>Themed Terminal</Text>
          <Name>configure-terminal</Name>
        </CheckboxOption>
      </Options>
    </CheckboxPage>
    <CheckboxPage IsRequired="true" Description="LexBoosT™ configuration options: Page 2">
      <Options>
        <CheckboxOption IsChecked="false">
          <Text>Desktop optimizations (disable on laptop)</Text>
          <Name>desktop-only</Name>
        </CheckboxOption>
      </Options>
    </CheckboxPage>
    <RadioImagePage Description="Do you want clean Start Menu?">
        <Options>
            <RadioImageOption None="true"/>
            <RadioImageOption>
                <Text>Yes</Text>
                <Name>wipe-startmenu</Name>
                <FileName>Wipe</FileName>
                <GradientTopColor>#1A1A1A</GradientTopColor>
                <GradientBottomColor>#050505</GradientBottomColor>
            </RadioImageOption>
        </Options>
    </RadioImagePage>
  </FeaturePages>
</Playbook>
