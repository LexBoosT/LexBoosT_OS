<?xml version="1.0" encoding="utf-8"?>
<Playbook>
  <Name>LexBoosT OS™</Name>
  <Username>LexBoosT™</Username>
  <Title>LexBoosT OS™</Title>
  <ShortDescription>Playbook for Windows 11</ShortDescription>
  <Description>This Playbook will help you quickly deploy LexBoosT OS™ on your current system.</Description>
  <Details>Experience an ideal, lightweight and stable system, designed to enhance performance and privacy while ensuring compatibility.</Details>
  <ProgressText>LexBoosT OS™ is currently installing software, copying its configuration folders, and tweaking Windows. Please wait...</ProgressText>
  <Version>26.06</Version>
  <!-- <ProductCode></ProductCode> -->
  <UniqueId>4526fadc-8222-4089-88f7-ad4d321580d2</UniqueId>
  <Overhaul>true</Overhaul>
  <UpgradableFrom>any</UpgradableFrom>
  <SupportedBuilds>
    <string>22000</string>
    <string>22621</string>
    <string>22631</string>
    <string>22635</string>
    <string>26100</string>
    <string>26120</string>
    <string>26200</string>
    <string>26220</string>
	  <string>26300</string>
    <string>28000</string>
	  <string>28020</string>
  </SupportedBuilds>
  <Requirements>
    <Requirement>DefenderToggled</Requirement>
    <Requirement>Internet</Requirement>
    <Requirement>NoPendingUpdates</Requirement>
    <Requirement>NoAntivirus</Requirement>
    <Requirement>PluggedIn</Requirement>
  </Requirements>
  <UseKernelDriver>false</UseKernelDriver>
  <Git>https://github.com/LexBoosT/LexBoosT_OS/releases</Git>
  <Website>https://lexboost.github.io/LexBoosT_OS/</Website>
  <DonateLink>https://ko-fi.com/lexboostdev</DonateLink>
  <FeaturePages>
    <RadioImagePage Description="Do you want to make a Backup before installing?)">
        <Options>
            <RadioImageOption None="true"/>
            <RadioImageOption>
                <Text>Yes</Text>
                <Name>backup</Name>
                <FileName>Backup</FileName>
                <GradientTopColor>#1A1A1A</GradientTopColor>
                <GradientBottomColor>#050505</GradientBottomColor>
            </RadioImageOption>
        </Options>
    </RadioImagePage>
    <CheckboxPage IsRequired="true"
      Description="Browsers Menu.">
      <Options>
        <CheckboxOption IsChecked="false">
          <Text>Remove Microsoft Edge</Text>
          <Name>remove-edge</Name>
        </CheckboxOption>
        <CheckboxOption IsChecked="false">
          <Text>Install Browser</Text>
          <Name>Browser</Name>
        </CheckboxOption>
      </Options>
    </CheckboxPage>
    <RadioImagePage CheckDefaultBrowser="true" DependsOn="Browser" Description="Please select a preferred browser.">
        <Options>
            <RadioImageOption None="true"/>
            <RadioImageOption>
                <Text>Brave</Text>
                <Name>Brave</Name>
                <FileName>Brave</FileName>
                <GradientTopColor>#A33401</GradientTopColor>
                <GradientBottomColor>#FFC481</GradientBottomColor>
            </RadioImageOption>
            <RadioImageOption>
                <Text>Firefox</Text>
                <Name>Firefox</Name>
                <FileName>Firefox</FileName>
                <GradientTopColor>#FFA500</GradientTopColor>
                <GradientBottomColor>#FF3300</GradientBottomColor>
            </RadioImageOption>
            <RadioImageOption>
                <Text>Vivaldi</Text>
                <Name>Vivaldi</Name>
                <FileName>Vivaldi</FileName>
                <GradientTopColor>#EF3939</GradientTopColor>
                <GradientBottomColor>#800000</GradientBottomColor>
            </RadioImageOption>
        </Options>
        <BottomLine Text="Privacy tests 🔒" Link="https://privacytests.org/"/>
    </RadioImagePage>
    <RadioImagePage DependsOn="Browser" Description="Please select a preferred browser, page 2.">
        <Options>
            <RadioImageOption None="true"/>
            <RadioImageOption>
                <Text>Chrome</Text>
                <Name>Chrome</Name>
                <FileName>Chrome</FileName>
                <GradientTopColor>#4285F4</GradientTopColor>
                <GradientBottomColor>#1A237E</GradientBottomColor>
            </RadioImageOption>
            <RadioImageOption>
                <Text>OperaGX</Text>
                <Name>OperaGX</Name>
                <FileName>OperaGX</FileName>
                <GradientTopColor>#7B2FBE</GradientTopColor>
                <GradientBottomColor>#3B0764</GradientBottomColor>
            </RadioImageOption>
            <RadioImageOption>
                <Text>Zen</Text>
                <Name>Zen</Name>
                <FileName>Zen</FileName>
                <GradientTopColor>#1A1A1A</GradientTopColor>
                <GradientBottomColor>#050505</GradientBottomColor>
            </RadioImageOption>
        </Options>
        <BottomLine Text="Privacy tests 🔒" Link="https://privacytests.org/"/>
    </RadioImagePage>
    <CheckboxPage IsRequired="true"
      Description="Please select which UWP Appx packages you would like to remove.">
      <Options>
        <CheckboxOption IsChecked="true">
          <Text>Windows Debloater</Text>
          <Name>remove-appx-packages</Name>
        </CheckboxOption>
        <CheckboxOption IsChecked="true">
          <Text>Remove Dev Home (23H2+)</Text>
          <Name>remove-appx-devhome</Name>
        </CheckboxOption>
        <CheckboxOption IsChecked="true">
          <Text>Remove 'Your Phone'</Text>
          <Name>remove-appx-yourphone</Name>
        </CheckboxOption>
      </Options>
    </CheckboxPage>
    <CheckboxPage IsRequired="true"
      Description="Please select which UWP Appx packages you would like to remove, page 2">
      <Options>
        <CheckboxOption IsChecked="true">
          <Text>Remove 'Outlook'</Text>
          <Name>remove-appx-outlook</Name>
        </CheckboxOption>
        <CheckboxOption IsChecked="true">
          <Text>Remove 'Zune Music'</Text>
          <Name>remove-appx-music</Name>
        </CheckboxOption>
        <CheckboxOption IsChecked="true">
          <Text>Remove 'Zune Video'</Text>
          <Name>remove-appx-video</Name>
        </CheckboxOption>
        <CheckboxOption IsChecked="true">
          <Text>Remove OneDrive</Text>
          <Name>remove-onedrive</Name>
        </CheckboxOption>
      </Options>
    </CheckboxPage>
    <CheckboxPage IsRequired="true" Description="LexBoosT™ configuration options">
      <Options>
        <CheckboxOption IsChecked="true">
          <Text>LexBoosT OS™ Theme</Text>
          <Name>configure-theme</Name>
        </CheckboxOption>
        <CheckboxOption IsChecked="true">
          <Text>Enable Dark Mode</Text>
          <Name>configure-darkmode</Name>
        </CheckboxOption>
        <CheckboxOption IsChecked="true">
          <Text>LexBoosT™ Visual Performance</Text>
          <Name>lex-visual</Name>
        </CheckboxOption>
        <CheckboxOption IsChecked="true">
          <Text>Hide Recommended Section</Text>
          <Name>hide-s</Name>
        </CheckboxOption>
      </Options>
    </CheckboxPage>
    <CheckboxPage IsRequired="true" Description="LexBoosT™ configuration options, page 2">
      <Options>
        <CheckboxOption IsChecked="false">
          <Text>Disable Transparency</Text>
          <Name>transparency</Name>
        </CheckboxOption>
        <CheckboxOption IsChecked="true">
          <Text>Remove Taskbar Search</Text>
          <Name>taskbar-search</Name>
        </CheckboxOption>
        <CheckboxOption IsChecked="false">
          <Text>Enable legacy context menu</Text>
          <Name>configure-lcm</Name>
        </CheckboxOption>
        <CheckboxOption IsChecked="false">
          <Text>UTC hardware clock (Linux dual-boot)</Text>
          <Name>dual-boot-time</Name>
        </CheckboxOption>
      </Options>
    </CheckboxPage>
	<RadioImagePage Description="Do you want Install Chipset Driver?">
        <Options>
            <RadioImageOption None="true"/>
            <RadioImageOption>
                <Text>Intel</Text>
                <Name>intel-chipset</Name>
                <FileName>Intel</FileName>
                <GradientTopColor>#F1F1F1</GradientTopColor>
                <GradientBottomColor>#FCFCFC</GradientBottomColor>
            </RadioImageOption>
            <RadioImageOption>
                <Text>AMD</Text>
                <Name>amd-chipset</Name>
                <FileName>AMD</FileName>
                <GradientTopColor>#F1F1F1</GradientTopColor>
                <GradientBottomColor>#FCFCFC</GradientBottomColor>
            </RadioImageOption>
        </Options>
    </RadioImagePage>
    <RadioImagePage Description="Do you want clean Start Menu?">
        <Options>
            <RadioImageOption None="true"/>
            <RadioImageOption>
                <Text>Wipe!</Text>
                <Name>wipe-startmenu</Name>
                <FileName>Wipe</FileName>
                <GradientTopColor>#1A1A1A</GradientTopColor>
                <GradientBottomColor>#050505</GradientBottomColor>
            </RadioImageOption>
        </Options>
    </RadioImagePage>
  </FeaturePages>
</Playbook>
